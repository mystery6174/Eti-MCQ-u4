    <script>
        const questions = [
            { q: "What does the term 'XR' stand for?", options: ["Extended Reality", "Extra Reality", "External Reality", "Extreme Reality"], a: 0, e: "XR (Extended Reality) is an umbrella term encompassing Virtual Reality (VR), Augmented Reality (AR), and Mixed Reality (MR)." },
  { q: "Which immersive technology completely replaces the user's real-world environment with a simulated one?", options: ["Augmented Reality", "Mixed Reality", "Cinematic Reality", "Virtual Reality"], a: 3, e: "Virtual Reality (VR) uses headsets to fully block out the physical world and immerse the user in a digital environment." },
  { q: "Which technology overlays digital information onto the user's real-world view without allowing deep interaction between the two?", options: ["Assisted Reality", "Augmented Reality", "Mixed Reality", "Virtual Reality"], a: 1, e: "Augmented Reality (AR) adds digital elements to a live view, usually via a smartphone camera or AR glasses." },
  { q: "In which technology do digital and physical objects co-exist and interact with each other in real-time?", options: ["Virtual Reality", "3D Video", "Mixed Reality", "Augmented Reality"], a: 2, e: "Mixed Reality (MR) merges real and virtual worlds to produce new environments where physical and digital objects co-exist and interact." },
  { q: "What is the primary difference between AR and VR?", options: ["VR uses smartphones, AR uses headsets", "AR is more immersive than VR", "There is no difference", "VR replaces reality, AR adds to reality"], a: 3, e: "VR isolates the user in a completely digital world, whereas AR simply overlays digital content on top of the real physical world." },
  { q: "Which term describes the feeling of 'being there' in a virtual environment?", options: ["Latency", "Tracking", "Presence", "Rendering"], a: 2, e: "Presence is the psychological sensation of actually being in the virtual space, a key goal of VR design." },
  { q: "What is 'Immersion' in the context of VR?", options: ["The physical hardware used", "The speed of the internet connection", "The process of writing code for VR", "The objective level of sensory fidelity provided by the system"], a: 3, e: "Immersion refers to the objective, technical degree to which a system can simulate reality for the user's senses." },
  { q: "Which of the following is NOT a core component of Extended Reality?", options: ["Artificial Reality", "Virtual Reality", "Augmented Reality", "Mixed Reality"], a: 0, e: "XR traditionally includes VR, AR, and MR. 'Artificial Reality' is an outdated term not standard in the XR acronym." },
  { q: "What role does tracking play in immersive technologies?", options: ["Matching the user's physical movements with the virtual environment", "Monitoring internet usage", "Tracking software bugs", "Following other players online"], a: 0, e: "Tracking ensures that when a user moves their head or hands, the virtual environment reacts in real-time." },
  { q: "A completely synthetic environment that reacts to user input is the definition of:", options: ["Augmented Reality", "Mixed Reality", "Virtual Reality", "Real World"], a: 2, e: "VR is entirely synthetic (computer-generated) and responds to the user's actions." },
  { q: "Pokémon GO is the most famous mainstream example of which technology?", options: ["VR", "AR", "MR", "XR hardware"], a: 1, e: "Pokémon GO uses the smartphone camera to overlay digital creatures onto the real world, making it an AR application." },
  { q: "Which of the following describes the 'Continuum' introduced by Paul Milgram?", options: ["The history of VR development", "The programming loop of a game engine", "The spectrum of internet speeds", "The scale from purely physical environments to purely virtual environments"], a: 3, e: "The Reality-Virtuality Continuum by Paul Milgram describes a scale ranging from the completely real environment to a completely virtual one." },
  { q: "Where does Augmented Reality sit on Milgram’s Reality-Virtuality Continuum?", options: ["Closer to the real environment", "At the extreme virtual end", "At the extreme real end", "Closer to the virtual environment"], a: 0, e: "AR is closer to the real environment because the primary view is still the physical world." },
  { q: "Where does Augmented Virtuality (AV) sit on the Continuum?", options: ["Closer to the real environment", "It is exactly in the middle", "Closer to the virtual environment", "It is outside the continuum"], a: 2, e: "Augmented Virtuality involves a primarily virtual environment that integrates real-world objects." },
  { q: "What type of reality relies entirely on headsets that occlude (block) the real world?", options: ["AR", "VR", "MR", "XR"], a: 1, e: "VR headsets completely occlude the real world to immerse the user in a digital one." },
  { q: "What does 'FOV' stand for in VR headsets?", options: ["Frequency of View", "Focus on Vision", "Frame of Verification", "Field of View"], a: 3, e: "Field of View (FOV) refers to the extent of the observable world that is seen at any given moment." },
  { q: "A wider Field of View (FOV) in VR generally leads to:", options: ["A greater sense of immersion", "More motion sickness", "Lower resolution", "Slower processing speed"], a: 0, e: "A wider FOV mimics human peripheral vision, making the VR experience feel much more immersive." },
  { q: "Which metric is crucial to prevent motion sickness in VR?", options: ["Low Refresh Rate", "High Latency", "Low Resolution", "Low Latency"], a: 3, e: "Low latency (motion-to-photon latency) ensures the visual updates happen instantly as you move your head, preventing nausea." },
  { q: "What is 'Latency' in VR?", options: ["The time it takes to download a game", "The delay between a user's movement and the corresponding update on the screen", "The battery life of the headset", "The brightness of the screen"], a: 1, e: "Latency is the lag between physical movement and visual feedback. High latency causes motion sickness." },
  { q: "What is the recommended maximum latency for a smooth VR experience?", options: ["100 milliseconds", "50 milliseconds", "20 milliseconds", "500 milliseconds"], a: 2, e: "To prevent cybersickness, motion-to-photon latency should generally be kept below 20 milliseconds." },

  // --- Virtual Reality Concepts (DoF, Rendering, Types) ---
  { q: "What does 'DoF' stand for in immersive technology?", options: ["Depth of Field", "Direction of Force", "Data of Frames", "Degrees of Freedom"], a: 3, e: "Degrees of Freedom (DoF) refers to the number of ways a rigid object can move through 3D space." },
  { q: "How many Degrees of Freedom (DoF) are required to track both rotation and position?", options: ["6 DoF", "2 DoF", "3 DoF", "9 DoF"], a: 0, e: "6 DoF tracks rotation (pitch, yaw, roll) and position (up/down, left/right, forward/backward)." },
  { q: "A VR headset that only tracks where you look (Pitch, Yaw, Roll) but not your physical movement in the room is called:", options: ["6 DoF", "0 DoF", "3 DoF", "Full DoF"], a: 2, e: "3 DoF only tracks rotational movements (looking around from a fixed point)." },
  { q: "If you can walk around a virtual room, duck, and jump, your VR system must support:", options: ["3 DoF", "2 DoF", "1 DoF", "6 DoF"], a: 3, e: "Walking, ducking, and jumping require positional tracking, which necessitates 6 DoF." },
  { q: "Which of the following is an example of a 3 DoF VR headset?", options: ["Google Cardboard", "Oculus Quest 2", "HTC Vive Pro", "PlayStation VR"], a: 0, e: "Google Cardboard relies entirely on phone sensors, which only track rotation (3 DoF)." },
  { q: "What is 'Stereoscopy' in VR?", options: ["Recording 3D audio", "Controlling the game with a joystick", "Displaying a slightly different image to each eye to create depth perception", "Tracking hand movements"], a: 2, e: "Stereoscopy mimics human binocular vision by showing offset images to each eye, creating a 3D effect." },
  { q: "Which sense is most dominantly targeted by VR systems?", options: ["Vision", "Hearing", "Touch", "Smell"], a: 0, e: "While VR uses audio, the primary and most important sensory input it manipulates is vision." },
  { q: "What technology is used to simulate the sense of touch in VR/AR?", options: ["Stereoscopy", "Haptics", "Spatial Audio", "Ray Tracing"], a: 1, e: "Haptic feedback uses vibrations, forces, or motions to simulate the physical feeling of touching objects." },
  { q: "Spatial audio in VR is important because it:", options: ["Makes the music louder", "Reduces battery consumption", "Allows users to pinpoint the exact 3D location a sound is coming from", "Prevents visual lag"], a: 2, e: "Spatial audio helps ground the user in the virtual world by making sounds originate from specific physical directions." },
  { q: "Non-immersive VR is best described as:", options: ["Using a VR headset without controllers", "A VR experience with no sound", "AR technology", "Interacting with a 3D environment through a standard 2D monitor (like a PC game)"], a: 3, e: "Non-immersive VR (like desktop gaming) provides a virtual environment but lacks the sensory enclosure of a headset." },
  { q: "Semi-immersive VR is commonly used for:", options: ["Smartphone gaming", "Text-based coding", "Listening to podcasts", "Flight simulators with physical cockpits and large screens"], a: 3, e: "Semi-immersive systems often combine physical props (like a cockpit) with large screens, common in training simulators." },
  { q: "Fully-immersive VR requires:", options: ["A standard laptop", "A projector", "A Head-Mounted Display (HMD)", "Just a smartphone"], a: 2, e: "Fully immersive VR completely isolates the user using an HMD (Head-Mounted Display)." },
  { q: "The illusion of a stable environment even when the user moves their head is called:", options: ["Registration", "Telepresence", "Position tracking stability", "Motion smoothing"], a: 0, e: "Registration ensures virtual objects stay anchored in their correct virtual or physical locations when the user moves." },
  { q: "What is the 'Refresh Rate' of a VR display?", options: ["How fast the battery charges", "The time it takes to download a game", "The volume of the spatial audio", "How many times per second the display updates the image"], a: 3, e: "Refresh rate, measured in Hertz (Hz), indicates how many times per second the screen draws a new image." },
  { q: "Why is a high refresh rate (e.g., 90Hz or 120Hz) critical for VR?", options: ["To make the headset lighter", "To prevent motion sickness and provide a smooth experience", "To save electricity", "To improve internet speed"], a: 1, e: "Low refresh rates cause visual stutter, which quickly leads to nausea and eye strain in VR." },
  { q: "What is 'IPD' in the context of VR headsets?", options: ["Inter-Pupillary Distance", "Internet Protocol Data", "Internal Processing Display", "Image Pixel Density"], a: 0, e: "IPD is the distance between the centers of your eyes. Adjusting it ensures the VR lenses align perfectly with your pupils for clear vision." },
  { q: "What happens if a VR headset's IPD is set incorrectly for the user?", options: ["The battery drains faster", "The image appears blurry and causes eye strain", "The sound becomes muted", "The controllers disconnect"], a: 1, e: "Incorrect IPD means the user is not looking through the 'sweet spot' of the lenses, causing blurriness and discomfort." },
  { q: "Which mapping technique translates physical walking into virtual walking?", options: ["Teleportation", "Joystick locomotion", "Static routing", "Room-scale tracking"], a: 3, e: "Room-scale tracking allows the system to map a physical space so the user can physically walk around inside the virtual world." },
  { q: "What is 'Teleportation' in VR locomotion?", options: ["Walking physically in a room", "Moving continuously using a joystick", "Pointing to a location and instantly jumping there to prevent motion sickness", "Running on an omnidirectional treadmill"], a: 2, e: "Teleportation instantly moves the user, which bypasses the inner ear's motion detection and prevents cybersickness." },
  { q: "An omnidirectional treadmill is used in VR to:", options: ["Allow a user to physically walk or run in any direction while staying in one place", "Charge the headset", "Track eye movements", "Improve Wi-Fi signal"], a: 0, e: "These treadmills solve the physical space limitation, allowing infinite virtual movement." },

  // --- Augmented Reality Concepts ---
  { q: "Which type of AR relies on scanning specific visual patterns, like QR codes or images, to trigger digital content?", options: ["Markerless AR", "Marker-based AR", "Location-based AR", "Projection-based AR"], a: 1, e: "Marker-based AR requires a physical visual trigger (marker) for the camera to recognize and anchor the AR content." },
  { q: "Which type of AR does NOT require a specific visual image to trigger content, but instead maps the physical environment?", options: ["Marker-based AR", "Superimposition AR", "Outline AR", "Markerless AR"], a: 3, e: "Markerless AR uses the camera and sensors to map the environment (planes, walls) and place objects anywhere." },
  { q: "Location-based AR relies primarily on which technology to place digital objects?", options: ["Bluetooth only", "Infrared sensors", "GPS, Compass, and Accelerometer", "QR Codes"], a: 2, e: "Location-based AR uses device GPS and compass data to overlay information based on geographic coordinates." },
  { q: "Which of the following is an example of Projection-based AR?", options: ["Snapchat face filters", "Pokémon GO", "A virtual keyboard projected onto a desk that detects finger typing", "Google Maps AR navigation"], a: 2, e: "Projection-based AR projects artificial light onto physical surfaces and senses human interaction with that projected light." },
  { q: "What does Superimposition AR do?", options: ["Creates a fully virtual room", "Projects holograms in mid-air", "Uses GPS to find locations", "Partially or fully replaces the original view of an object with an augmented view"], a: 3, e: "Superimposition AR recognizes an object and overlays a digital model over it, like seeing an X-ray view of a machine." },
  { q: "What is SLAM in the context of AR and MR?", options: ["Simulated Local Area Mapping", "System Log and Monitoring", "Simultaneous Localization and Mapping", "Spatial Location and Measurement"], a: 2, e: "SLAM is the technology that allows a device to understand its physical environment and its own position within it." },
  { q: "Why is SLAM critical for advanced AR?", options: ["It allows digital objects to 'anchor' to physical surfaces accurately", "It lowers battery usage", "It translates languages in real-time", "It records audio"], a: 0, e: "SLAM maps physical planes (like tables) so AR objects sit on them naturally without floating away." },
  { q: "Snapchat and Instagram face filters are primarily examples of which AR technique?", options: ["Location-based AR", "Facial recognition and tracking AR", "Projection-based AR", "VR"], a: 1, e: "These apps track facial landmarks (eyes, nose, mouth) in real-time to anchor digital overlays (filters)." },
  { q: "Which company developed the ARKit framework?", options: ["Google", "Microsoft", "Facebook", "Apple"], a: 3, e: "ARKit is Apple's framework for developing augmented reality applications for iOS devices." },
  { q: "Which company developed the ARCore framework?", options: ["Microsoft", "Apple", "Google", "Unity"], a: 2, e: "ARCore is Google's platform for building augmented reality experiences, primarily for Android." },
  { q: "What is the 'Camera Passthrough' feature in XR headsets?", options: ["Recording video for YouTube", "A way to take selfies", "Using the exterior cameras to show the user the real world inside the VR headset", "Passing the camera to another user"], a: 2, e: "Passthrough allows users wearing enclosed headsets to safely see their real-world surroundings using exterior cameras." },
  { q: "Which hardware component is absolutely essential for mobile AR to function?", options: ["Keyboard", "A projector", "A camera", "A 4K screen"], a: 2, e: "The camera captures the physical world so the software can analyze it and overlay digital elements." },
  { q: "What is 'Light Estimation' in AR?", options: ["Matching the lighting and shadows of digital objects to the real-world environment", "Measuring battery life", "Turning on the phone's flashlight", "Calculating file sizes"], a: 0, e: "Light estimation makes AR objects look realistic by making their shadows and lighting match the physical room." },
  { q: "What happens if AR registration fails?", options: ["The app deletes itself", "The battery drains instantly", "The camera turns off", "Digital objects will appear to jitter, float, or slide away from their intended physical locations"], a: 3, e: "Registration aligns the virtual and real worlds. Poor registration breaks the illusion of AR." },
  { q: "Which of the following is a major use case for AR in retail?", options: ["Playing intense 3D shooters", "Coding new software", "Writing emails", "Trying on virtual clothes or placing virtual furniture in a room"], a: 3, e: "AR allows customers to visualize products (like IKEA furniture or glasses) in their real environment before buying." },
  { q: "How does AR aid in maintenance and repair?", options: ["By replacing the physical tools with digital ones", "By playing relaxing music", "By generating invoices", "By overlaying step-by-step repair instructions and diagrams directly onto the physical machine"], a: 3, e: "Technicians can look at a machine and see arrows, warnings, and schematics superimposed on the actual parts." },
  { q: "What is 'Occlusion' in advanced AR?", options: ["Closing the app", "When the screen turns black", "When physical objects block the view of digital objects behind them, adding realism", "A type of AR marker"], a: 2, e: "If a digital pet walks behind a physical sofa, occlusion ensures the pet is hidden from view, making it feel real." },
  { q: "Which sensor is highly beneficial for perfect AR occlusion and depth mapping on modern smartphones?", options: ["Microphone", "Thermometer", "LiDAR scanner", "Barometer"], a: 2, e: "LiDAR (Light Detection and Ranging) shoots lasers to map depth instantly, enabling perfect occlusion and SLAM." },
  { q: "What is the primary display method for Smart Glasses like Google Glass?", options: ["Large VR screens", "Holographic projections", "Mobile phone screens", "Heads-Up Display (HUD)"], a: 3, e: "Smart glasses typically use a small prism HUD to reflect a simple screen into the user's peripheral vision." },
  { q: "What differentiates AR from a simple Photoshop edit?", options: ["AR renders and updates spatial digital content in real-time as the user moves", "AR is in black and white", "AR cannot be shared", "AR only works on computers"], a: 0, e: "AR is dynamic and real-time. As you move the camera, the perspective of the digital object changes correctly." },

  // --- Mixed Reality & Metaverse Concepts ---
  { q: "Which headset is widely considered the pioneer of standalone Mixed Reality (holographic computing)?", options: ["Oculus Rift", "Microsoft HoloLens", "Google Cardboard", "Sony PlayStation VR"], a: 1, e: "The Microsoft HoloLens was the first major standalone holographic MR computer." },
  { q: "In Mixed Reality, what defines a 'Hologram' (in the context of HoloLens)?", options: ["A physical 3D printed object", "A 2D video playing on a screen", "An object made of light and sound that appears to exist in the real world and reacts to it", "A text document"], a: 2, e: "MR holograms are digital objects that understand physical space and can interact with real-world surfaces." },
  { q: "What allows MR headsets to understand hand gestures in mid-air without controllers?", options: ["Mouse clicks", "Voice recognition", "Foot pedals", "Hand Tracking via depth cameras"], a: 3, e: "MR headsets use inward and outward-facing cameras to track the articulation of the user's hands and fingers." },
  { q: "What is a 'Spatial Anchor' in MR?", options: ["A heavy weight attached to the headset", "A software bug", "A type of battery", "A specific point in physical space where a hologram is permanently pinned"], a: 3, e: "Spatial anchors allow digital objects to persist in the exact same physical location even if the headset is restarted." },
  { q: "How is Mixed Reality fundamentally different from basic AR?", options: ["MR requires no screen", "In MR, digital objects can interact directly with physical objects (e.g., a digital ball bouncing off a real physical table)", "MR only uses text", "MR is purely virtual"], a: 1, e: "Basic AR just overlays graphics. MR integrates them spatially so they obey physical laws involving real-world surfaces." },
  { q: "What is the 'Metaverse'?", options: ["A new type of hardware", "A proposed highly immersive, interconnected 3D virtual universe where people work, play, and socialize", "A specific video game made by Facebook", "A cryptocurrency"], a: 1, e: "The Metaverse is envisioned as the next iteration of the internet, characterized by persistent 3D virtual spaces linked together." },
  { q: "Which concept is crucial for the Metaverse to allow users to move assets between different virtual worlds?", options: ["Isolation", "Interoperability", "High latency", "Monopoly"], a: 1, e: "Interoperability is the ability of different systems and virtual worlds to connect and share avatars, items, and data seamlessly." },
  { q: "What defines an 'Avatar' in the Metaverse/VR?", options: ["The user's password", "The digital representation or persona of the user in the virtual world", "The headset hardware", "The game's map"], a: 1, e: "An avatar is your virtual body or representation that others see and interact with." },
  { q: "What does persistent environment mean in the Metaverse?", options: ["The virtual world continues to exist, evolve, and function even when you are not logged in", "The world shuts down when you log off", "The graphics never change", "The game crashes frequently"], a: 0, e: "Persistence means the digital world is always 'on', much like the real world." },
  { q: "Which underlying technology is frequently proposed to manage ownership and identity in the Metaverse?", options: ["Floppy disks", "Dial-up internet", "Blockchain and Web3", "Analog radio"], a: 2, e: "Blockchain (including NFTs and smart contracts) is often used to prove digital ownership of metaverse assets." },
  { q: "What does 'Spatial Computing' refer to?", options: ["Computing done in outer space", "Interacting with computers in 3D physical space rather than via 2D flat screens", "Using large server rooms", "Mathematical calculations only"], a: 1, e: "Spatial computing treats the 3D space around the user as the computing environment (e.g., Apple Vision Pro)." },
  { q: "Which term describes a 1:1 digital replica of a physical entity, such as a factory or a city?", options: ["Virtual Clone", "Digital Twin", "Meta-copy", "Holo-duplicate"], a: 1, e: "A Digital Twin is a precise virtual model of a physical object, updated with real-time data for simulation and monitoring." },
  { q: "How is MR used in architecture?", options: ["Writing code", "Editing photos", "Sending emails", "Clients can walk through full-scale holographic models of buildings before construction begins"], a: 3, e: "MR allows architects and clients to visualize structures spatially on physical sites before breaking ground." },
  { q: "Which UI interaction is standard in advanced MR (like HoloLens/Vision Pro)?", options: ["Gaze (eye tracking) and Pinch (hand tracking)", "Keyboard typing", "Joystick movement", "Mouse clicking"], a: 0, e: "Looking at an object (gaze) and tapping fingers together (pinch) is the modern spatial computing UI." },
  { q: "What is 'Eye Tracking' used for in modern XR headsets?", options: ["Spying on users", "Measuring screen brightness", "Tracking physical steps", "Foveated rendering and intuitive UI selection"], a: 3, e: "Eye tracking knows exactly where you look, allowing menus to react to your gaze." },
  { q: "What is 'Foveated Rendering'?", options: ["Rendering the whole screen at low quality", "Rendering the exact spot the user is looking at in high resolution, and the peripheral vision in lower resolution to save processing power", "A way to render audio", "Rendering only black and white"], a: 1, e: "Foveated rendering mimics the human eye, drastically reducing the GPU load required for VR." },
  { q: "Why is 5G technology considered critical for the future of XR and the Metaverse?", options: ["It offers high bandwidth and ultra-low latency required for real-time cloud rendering of complex XR environments", "It provides smaller headsets", "It improves screen resolution", "It extends battery life"], a: 0, e: "5G networks enable the heavy processing of XR to happen in the cloud, sending the images to lightweight headsets instantly." },
  { q: "What is a major privacy concern regarding XR and the Metaverse?", options: ["Too much hard drive space used", "The massive collection of biometric data, eye tracking, and physical room mapping", "Headsets breaking easily", "Games being too expensive"], a: 1, e: "XR headsets map users' homes and track their micro-movements, raising unprecedented privacy issues." },
  { q: "What is 'WebXR'?", options: ["A new web browser", "A type of internet cable", "An API standard allowing VR and AR experiences to run directly in web browsers without downloading apps", "A cybersecurity protocol"], a: 2, e: "WebXR democratizes immersive tech by letting users click a link and immediately enter VR/AR in Chrome or Safari." },
  { q: "In MR, what does 'Environmental Understanding' entail?", options: ["The headset identifying floors, walls, and tables to properly place holograms", "Knowing the weather outside", "Monitoring the user's mood", "Calculating the room temperature"], a: 0, e: "The device maps the room's geometry so digital objects interact with physical barriers correctly." },

  // --- Hardware Components & Tracking Systems ---
  { q: "What is the primary purpose of an HMD?", options: ["To hold a microphone", "To mount display screens directly in front of the user's eyes", "To track foot movements", "To cool down the computer"], a: 1, e: "A Head-Mounted Display (HMD) houses the lenses and screens required for VR and MR." },
  { q: "Which sensor is used to measure the rotational motion and orientation of a VR headset?", options: ["Thermometer", "Barometer", "Proximity sensor", "Gyroscope"], a: 3, e: "Gyroscopes detect rotational movements (pitch, yaw, roll) of the headset." },
  { q: "Which sensor measures the linear acceleration (speeding up or slowing down) of the headset?", options: ["Magnetometer", "Camera", "Accelerometer", "GPS"], a: 2, e: "Accelerometers detect changes in velocity and physical movement." },
  { q: "What is an IMU?", options: ["Internal Measurement Unit", "Image Mapping Utility", "Integrated Motion Unit", "Inertial Measurement Unit"], a: 3, e: "The IMU (Inertial Measurement Unit) combines a gyroscope, accelerometer, and magnetometer to track headset movement." },
  { q: "What does 'Inside-Out Tracking' mean?", options: ["Cameras placed around the room track the headset", "Tracking the inside of the user's eyes", "Cameras built into the headset look outward to map the room and track the user's position", "Tracking done outside the house"], a: 2, e: "Inside-out tracking requires no external base stations; the headset figures out its own position using built-in cameras." },
  { q: "What does 'Outside-In Tracking' mean?", options: ["Cameras on the headset looking out", "Tracking the weather outside", "External sensors or cameras placed in the corners of the physical room tracking the headset's position", "Using GPS only"], a: 2, e: "Outside-in tracking (like the original HTC Vive lighthouses) uses external emitters/sensors looking inward at the user." },
  { q: "What is a major advantage of Inside-Out tracking?", options: ["It is 100% flawless", "It requires a massive PC", "It only works in the dark", "It requires no setup of external sensors, making it highly portable"], a: 3, e: "Headsets like the Meta Quest use inside-out tracking, allowing users to use them anywhere without setting up cameras." },
  { q: "Which of the following display technologies is highly preferred in premium VR headsets due to deep blacks and fast response times?", options: ["OLED / Micro-OLED", "LCD", "CRT", "E-ink"], a: 0, e: "OLED displays offer pure blacks and very fast pixel switching, preventing blurring in VR." },
  { q: "Why do VR headsets use specialized lenses (like Fresnel or Pancake lenses)?", options: ["To make the screen darker", "To protect the screen from scratching", "To bend the light so the user's eyes can focus on a screen that is only an inch away", "To record video"], a: 2, e: "Without lenses, human eyes cannot focus on a screen right in front of them. Lenses warp the light to simulate distance." },
  { q: "What is a 'Fresnel Lens'?", options: ["A lens used to zoom in on distant objects", "A lightweight lens with concentric ridges that focuses light in a short distance, commonly used in older VR headsets", "A contact lens", "A camera lens"], a: 1, e: "Fresnel lenses allow VR headsets to be thinner and lighter than using traditional thick glass lenses." },
  { q: "What is the advantage of 'Pancake Lenses' over Fresnel lenses in newer VR headsets?", options: ["They taste better", "They are cheaper to make", "They lower the resolution", "They fold light multiple times, allowing the headset to be much thinner and lighter"], a: 3, e: "Pancake lenses bounce light back and forth, significantly reducing the required distance between the screen and the lens." },
  { q: "What is 'Screen Door Effect' (SDE) in VR?", options: ["When a virtual door won't open", "The visual artifact where the unlit spaces between pixels are visible, looking like looking through a mesh screen", "A feature to see the real world", "A type of screen protector"], a: 1, e: "SDE was common in early VR due to low resolution; you could see the grid of pixels." },
  { q: "How do manufacturers eliminate the Screen Door Effect?", options: ["By making screens smaller", "By turning off the brightness", "By significantly increasing the display resolution (pixel density)", "By using audio"], a: 2, e: "Higher resolution displays pack pixels so closely together that the gaps between them become invisible to the eye." },
  { q: "What role does a 'Tethered' VR headset have?", options: ["It runs on AA batteries", "It connects to smartphones", "It must be physically connected to a powerful PC or console via a cable to process the graphics", "It requires no external hardware"], a: 2, e: "Tethered headsets (like Valve Index or PSVR2) use the processing power of a PC/Console rather than onboard mobile chips." },
  { q: "What is a 'Standalone' VR headset?", options: ["A headset that needs a PC", "A phone placed in a cardboard box", "A wireless headset with all computing hardware, battery, and tracking built directly into the device itself", "A pair of AR glasses"], a: 2, e: "Standalone headsets (like Meta Quest) are all-in-one devices requiring no external computers or wires." },
  { q: "Which type of tracking system suffers from 'Occlusion' problems (e.g., controllers losing tracking when behind the user's back)?", options: ["Outside-in tracking", "Magnetic tracking", "Inside-out tracking (Camera-based)", "GPS tracking"], a: 2, e: "Since inside-out tracking relies on cameras on the headset, it cannot see controllers that are behind the user's body." },
  { q: "What is a 'Controller' in VR?", options: ["The main processor", "The strap that holds the headset", "A handheld physical device that translates hand movements and button presses into the virtual world", "The charging cable"], a: 2, e: "Controllers provide buttons, joysticks, and physical tracking for the user's hands." },
  { q: "What do 'Base Stations' or 'Lighthouses' do in an outside-in VR setup?", options: ["Project Wi-Fi signals", "Sweep the room with invisible lasers/infrared light to track the sensors on the headset and controllers", "Provide power to the headset wirelessly", "Record audio"], a: 1, e: "Base stations act as reference points, blanketing the room in light that the headset uses to calculate its position." },
  { q: "What is a 'Haptic Vest'?", options: ["A wearable device that uses vibration motors to let users physically feel impacts, wind, or touch in VR", "A vest that cools the player down", "A bulletproof vest", "A vest that acts as a battery"], a: 0, e: "Haptic vests increase immersion by mapping in-game events (like getting shot or feeling rain) to physical vibrations on the body." },
  { q: "What is the primary function of the magnetometer in a smartphone AR setup?", options: ["Measure temperature", "Measure screen brightness", "Provide a sense of direction relative to the Earth's magnetic north (a compass)", "Track eye movement"], a: 2, e: "The magnetometer helps location-based AR apps know which physical direction the user is facing." },

  // --- Software, SDKs & Development ---
  { q: "Which game engine is overwhelmingly the most popular for developing XR (VR/AR) applications?", options: ["Unity 3D", "Unreal Engine", "Godot", "CryEngine"], a: 0, e: "Unity 3D commands the vast majority of the XR market due to its extensive AR/VR libraries and ease of use." },
  { q: "Besides Unity, which other major 3D engine is heavily used for high-fidelity AAA VR games?", options: ["Construct 3", "GameMaker Studio", "Unreal Engine", "RPG Maker"], a: 2, e: "Unreal Engine is known for high-end, realistic graphics and is a major player in XR development." },
  { q: "What does SDK stand for in AR/VR development?", options: ["Software Design Kit", "Software Development Kit", "Standard Development Kernel", "Simulated Data Kit"], a: 1, e: "An SDK provides the tools, libraries, and documentation developers need to build apps for specific platforms." },
  { q: "Which SDK is the standard for building AR apps on Apple iOS devices?", options: ["ARCore", "Vuforia", "Oculus SDK", "ARKit"], a: 3, e: "ARKit is Apple's proprietary framework for augmented reality on iPhones and iPads." },
  { q: "Which SDK is the standard for building AR apps on Android devices?", options: ["ARKit", "Kinect", "ARCore", "Holokit"], a: 2, e: "ARCore is Google's AR platform designed for Android devices." },
  { q: "Which popular AR development platform is known for its excellent Image Target (Marker-based) tracking across multiple platforms?", options: ["React Native", "Vuforia", "TensorFlow", "WordPress"], a: 1, e: "Vuforia is an enterprise-level AR SDK heavily used in Unity for recognizing specific images and 3D objects." },
  { q: "What is 'OpenXR'?", options: ["A specific brand of headset", "A royalty-free, open standard API that allows developers to create XR apps that work across multiple different headsets and platforms", "A closed ecosystem", "A VR game"], a: 1, e: "OpenXR solves platform fragmentation, allowing code to run on Meta, HTC, Valve, and Windows MR headsets without rewriting." },
  { q: "In 3D development, what is a 'Mesh'?", options: ["A network connection", "The color of an object", "The physics engine", "The structural framework (wireframe) consisting of vertices, edges, and faces that makes up a 3D model"], a: 3, e: "A 3D mesh gives an object its physical shape in a virtual environment." },
  { q: "What is 'Texturing' in 3D modeling?", options: ["Adding physical weight to an object", "Wrapping a 2D image over a 3D mesh to give it color, details, and material properties", "Coding the logic", "Recording audio"], a: 1, e: "Textures make a blank 3D mesh look like wood, metal, skin, etc." },
  { q: "What is a 'Rig' or 'Armature' in XR animation?", options: ["A type of camera", "The lighting setup", "A virtual skeleton placed inside a 3D model to allow it to be animated and moved", "The game's UI"], a: 2, e: "Rigging provides the joints and bones necessary to animate characters in Unity or Unreal." },
  { q: "What does a 'Physics Engine' do in a VR application?", options: ["Handles the internet connection", "Simulates real-world physical laws like gravity, collisions, and friction for virtual objects", "Compresses image files", "Generates sound effects"], a: 1, e: "The physics engine ensures that when you drop a virtual ball, it falls and bounces realistically." },
  { q: "What is 'Raycasting' in VR UI interaction?", options: ["Shooting an invisible virtual laser line from the controller to detect which object the user is pointing at", "Casting a shadow", "Rendering sunlight", "Streaming video"], a: 0, e: "Raycasting is the standard way users point at and click buttons in VR menus." },
  { q: "Which tool allows web developers to build XR experiences using HTML-like tags?", options: ["PHP", "A-Frame", "CSS", "SQL"], a: 1, e: "A-Frame is a popular open-source web framework for building 3D/VR experiences directly in HTML." },
  { q: "What is the primary function of a 'Collider' in a game engine?", options: ["To make objects visible", "To change colors", "To load levels", "To define the physical boundaries of an object so it can bump into other objects"], a: 3, e: "Without colliders, virtual hands or objects would just pass right through each other like ghosts." },
  { q: "In Unity, what is a 'Prefab'?", options: ["A reusable, pre-configured game object (like a fully designed enemy or interactive door) that can be duplicated", "A pre-recorded video", "A user manual", "A type of script"], a: 0, e: "Prefabs save developers time by allowing them to create a complex object once and spawn it many times." },
  { q: "When developing for VR, why is optimizing polygons (low-poly models) important?", options: ["To make the game look retro", "To save hard drive space only", "It is not important", "To maintain high frames per second (FPS) because rendering two screens is highly demanding on the GPU"], a: 3, e: "High polygon counts drop the frame rate, which leads to motion sickness in VR. Optimization is mandatory." },
  { q: "What is 'Baking' in the context of XR lighting?", options: ["Pre-calculating static lighting and shadows and saving them as textures to save real-time rendering performance", "Heating the server", "Creating 3D food models", "Writing code fast"], a: 0, e: "Baked lighting looks highly realistic but costs zero processing power during runtime, essential for mobile VR." },
  { q: "What is the purpose of 'Hand Tracking' APIs in modern SDKs?", options: ["To require gloves", "To type faster", "To record fingerprints", "To replace physical controllers by using cameras to detect the joints of the user's bare hands"], a: 3, e: "Hand tracking provides a controller-free, natural interface for interacting with XR environments." },
  { q: "Which programming language is primarily used when developing VR in Unity?", options: ["Python", "C++", "Java", "C# (C-Sharp)"], a: 3, e: "C# is the native scripting language for the Unity game engine." },
  { q: "Which programming system is primarily used in Unreal Engine for those who do not want to write C++ code?", options: ["JavaScript", "HTML", "Blueprints (Visual Scripting)", "Ruby"], a: 2, e: "Blueprints allow developers to create complex logic by connecting visual nodes rather than typing code." },

  // --- Applications across Industries ---
  { q: "How is VR utilized in the Medical Training field?", options: ["To play games", "To replace doctors completely", "To write prescriptions", "Allowing surgeons to practice complex surgeries in a risk-free, simulated 3D environment"], a: 3, e: "VR simulations let medical students practice procedures repeatedly without risking patient lives." },
  { q: "Which AR application is highly beneficial for Logistics and Warehousing?", options: ["Smart glasses guiding workers to the exact location of a package and scanning barcodes hands-free", "Playing music", "Monitoring the weather", "Driving delivery trucks via remote"], a: 0, e: "AR vision picking increases efficiency by highlighting bins and freeing up the worker's hands." },
  { q: "What is 'Exposure Therapy' in VR psychology?", options: ["Exposing the headset to light", "Exposing the code to open source", "Safely exposing patients to their phobias (e.g., heights, spiders) in a controlled virtual environment to reduce anxiety", "A marketing tactic"], a: 2, e: "VR is a proven psychological tool to treat PTSD and phobias by simulating stressful situations safely." },
  { q: "How does AR benefit the Real Estate industry?", options: ["By building actual houses", "By tracking property taxes", "Allowing buyers to see a virtually furnished empty apartment through their phone, or view 3D pop-up models of floor plans", "By replacing physical keys"], a: 2, e: "AR helps clients visualize the potential of a space before buying." },
  { q: "What is a 'Virtual Tour'?", options: ["A text description of a place", "A video game", "A 360-degree interactive simulation of an existing location, usually composed of panoramic images", "A zoom meeting"], a: 2, e: "Virtual tours (like Google Street View or Matterport) allow remote exploration of physical spaces." },
  { q: "In the Automotive industry, how do designers use MR?", options: ["To drive the car on the road", "To listen to the radio", "To visualize and modify full-scale 3D holographic car models cooperatively before creating clay models", "To print 2D blueprints"], a: 2, e: "MR allows remote teams of engineers to walk around and tweak a virtual car together." },
  { q: "How is AR revolutionizing Retail and E-commerce?", options: ["By closing physical stores", "By printing receipts", "By creating virtual currency", "Through 'Try-before-you-buy' features, letting users see how furniture fits in their room or how glasses look on their face"], a: 3, e: "AR reduces return rates by letting consumers verify product fit and aesthetics in their own homes." },
  { q: "Which XR technology is most suited for a soldier's Heads-Up Display (HUD) showing tactical data on the battlefield?", options: ["Fully immersive VR", "Virtual Tours", "AR (Augmented Reality)", "360 Video"], a: 2, e: "Soldiers need to see the real world (situational awareness) while tactical data is overlaid on their vision." },
  { q: "How can VR be used in Education?", options: ["Taking students on virtual field trips to ancient Rome, inside the human body, or to Mars", "To replace physical textbooks entirely", "To prevent students from talking", "To write code"], a: 0, e: "VR provides experiential learning, bringing abstract concepts or unreachable places to life." },
  { q: "What is the benefit of using VR for hazardous safety training (e.g., firefighting, oil rig operations)?", options: ["It is cheaper than a book", "It takes less time to code", "It provides muscle memory and psychological stress training without putting employees in actual physical danger", "It is legally required everywhere"], a: 2, e: "Hazardous training in VR ensures workers know exactly what to do in emergencies without risking injury." },
  { q: "In the Tourism industry, what is the primary use of 360-degree VR videos?", options: ["Booking flights", "Offering a 'try before you fly' immersive preview of destinations and hotels to entice bookings", "Tracking luggage", "Translating languages"], a: 1, e: "Immersive previews build emotional connections and confidence, driving travel sales." },
  { q: "Which of the following is a prominent use of AR in Sports Broadcasting?", options: ["Making the ball disappear", "Superimposing the yellow first-down line on a football field or player statistics hovering above them", "Broadcasting in black and white", "Controlling player movements"], a: 1, e: "Broadcasters use AR to place informative graphics physically onto the field of play." },
  { q: "How is VR utilized in the Rehabilitation of stroke patients?", options: ["To measure heart rate", "By providing gamified, repetitive physical tasks in VR that motivate patients to regain motor skills", "By performing surgery", "By watching movies"], a: 1, e: "VR gamifies physical therapy, making the grueling repetition of rehab more engaging and trackable." },
  { q: "What is 'V-Tuber' (Virtual YouTuber)?", options: ["A video about VR", "An entertainer who uses motion capture to control an animated 2D or 3D avatar for live streaming", "A YouTube engineer", "A specific type of camera"], a: 1, e: "VTubing uses real-time XR tracking tech to map human expressions onto anime or 3D characters." },
  { q: "How is AR used in Navigation apps (like Google Maps Live View)?", options: ["By printing a map", "By verbally telling you to turn", "By tracking other cars", "By using the camera to overlay huge virtual arrows and street names directly onto the physical street view"], a: 3, e: "AR navigation removes the confusion of 2D maps by showing you exactly where to walk in the real world." },
  { q: "What role does XR play in 'Remote Assistance'?", options: ["Sending emails to a helpdesk", "An expert on a PC can see through a worker's AR glasses and draw circles or arrows that appear on the physical machine", "Automated chatbots", "Phone calls only"], a: 1, e: "Remote assistance AR drastically reduces downtime by letting experts guide on-site workers visually in real-time." },
  { q: "Which industry uses XR for 'Virtual Prototyping' to save millions on manufacturing physical test units?", options: ["Agriculture", "Food delivery", "Aerospace and Automotive", "Banking"], a: 2, e: "Companies like Boeing and Ford use VR to test ergonomics and assembly processes before building any physical parts." },
  { q: "How do museums utilize Augmented Reality?", options: ["By bringing static dinosaur skeletons to life or showing how ancient ruins looked originally when viewed through a phone", "To sell tickets", "To turn off the lights", "To replace tour guides"], a: 0, e: "AR adds an interactive, educational digital layer to physical museum exhibits." },
  { q: "What is an application of MR in Surgery?", options: ["Playing games during breaks", "Replacing the scalpel", "Overlaying a patient's 3D MRI scans directly onto their body during surgery to guide incisions", "Writing the bill"], a: 2, e: "MR gives surgeons 'x-ray vision' by perfectly registering internal scans onto the patient's physical anatomy." },
  { q: "How is VR used in the Fitness industry?", options: ["Turning cardio workouts into immersive games where players punch targets or slice blocks to the beat of music", "To track steps on a treadmill", "To weigh the user", "To buy protein powder"], a: 0, e: "Apps like Beat Saber and Supernatural use VR to make intense physical exercise feel like playing a game." },

  // --- Challenges, Human Factors & Future Trends ---
  { q: "What is the most common physiological problem users experience in VR?", options: ["Hearing loss", "High blood pressure", "Hair loss", "Cybersickness (Motion Sickness)"], a: 3, e: "Cybersickness occurs when there is a disconnect between visual motion and physical motion." },
  { q: "What causes Cybersickness in VR?", options: ["The screen is too bright", "A sensory conflict where the eyes see motion but the inner ear (vestibular system) feels no physical movement", "The headset is too heavy", "Loud audio"], a: 1, e: "This sensory mismatch confuses the brain, often triggering a nausea response similar to sea sickness." },
  { q: "What is the 'Vergence-Accommodation Conflict' (VAC) in stereoscopic displays?", options: ["A software crash", "A biological conflict where the eyes focus on a fixed screen distance but converge on objects appearing far away, causing eye strain", "A conflict between two players", "A type of resolution limit"], a: 1, e: "VAC is a primary cause of visual fatigue in VR because it forces the eyes to decouple natural focusing reflexes." },
  { q: "Which of the following hardware limitations is a major barrier to widespread AR glasses adoption?", options: ["They are too cheap", "They have too many games", "The tradeoff between battery life, processing power, heat dissipation, and form factor (weight/size)", "They are too easy to use"], a: 2, e: "Creating AR glasses that look like normal glasses but have the power of a computer is a massive engineering challenge." },
  { q: "Why is 'Field of View' (FOV) a current challenge for Augmented Reality glasses (like HoloLens)?", options: ["The holographic displays currently offer a very narrow FOV, making large virtual objects clip or disappear at the edges", "It is too wide", "It causes blindness", "It changes colors"], a: 0, e: "Unlike VR, AR waveguide lenses currently struggle to provide a wide field of view, breaking immersion." },
  { q: "What is 'Locomotion' in VR design?", options: ["The speed of the processor", "The methods designed for the user to move around the virtual world without physically walking into real walls", "The physics of dropping an object", "The color of the headset"], a: 1, e: "Solving locomotion (via teleportation, smooth turning, or treadmills) is key to making large VR games playable." },
  { q: "How can developers minimize VR motion sickness?", options: ["Lower the frame rate", "Use teleportation for movement, maintain 90+ FPS, and avoid forced camera movements", "Make the graphics blurry", "Use intense flashing lights"], a: 1, e: "Maintaining high performance and giving the user absolute control over the camera are rules for comfortable VR." },
  { q: "What is 'Friction' in the context of user adoption of XR technology?", options: ["The physical rubbing of the headset", "The hassle of setting up hardware, putting on a bulky headset, and loading apps compared to just picking up a phone", "The cost of games", "The speed of the internet"], a: 1, e: "High user friction prevents people from using VR daily. Standalone headsets aim to lower this friction." },
  { q: "What is 'Passthrough AR' (Mixed Reality on VR headsets)?", options: ["Looking through a glass window", "Using high-res color cameras on a VR headset to show the real world and overlaying digital objects on that video feed", "Passing the headset to a friend", "A type of screen protector"], a: 1, e: "Unlike see-through AR glasses, Passthrough AR captures the world with cameras and screens it inside the VR headset." },
  { q: "What does 'Volumetric Video' do?", options: ["Records audio in high volume", "Records standard 2D video", "Captures a performance using multiple cameras to create a 3D hologram that can be viewed from any angle in XR", "Increases the file size of images"], a: 2, e: "Volumetric capture records spatial data, allowing users to walk around a recorded person in AR/VR." },
  { q: "What is a 'Brain-Computer Interface' (BCI) in relation to the future of XR?", options: ["Technology that allows users to control XR environments or interact directly using brainwave signals", "A smart keyboard", "A psychology test", "A type of AI chatbot"], a: 0, e: "Companies are researching non-invasive BCIs to let users navigate AR menus just by thinking." },
  { q: "Why is tracking 'Six Degrees of Freedom' (6DoF) computationally expensive?", options: ["It requires tracking the internet speed", "It downloads huge files", "It drains the battery via Bluetooth", "It requires constant real-time processing of camera feeds and sensor data to map the environment and user position perfectly"], a: 3, e: "Running SLAM algorithms at 90 frames per second requires immense mathematical processing power." },
  { q: "Which demographic faces unique challenges with VR headset IPD (Inter-Pupillary Distance) ranges?", options: ["Tall adults", "Young children and women, whose average IPD is often smaller than the hardware limits allow", "Elderly users", "Teenagers"], a: 1, e: "Many headsets are designed around male averages; failing to accommodate smaller IPDs causes eyestrain for others." },
  { q: "What is the 'Uncanny Valley' in XR avatars?", options: ["A level in a video game", "A deep canyon in a VR app", "A psychological response where a 3D avatar looks almost human but slightly off, causing feelings of eeriness or revulsion", "A type of rendering error"], a: 2, e: "As graphics improve, avatars that are highly realistic but lack perfect human micro-expressions fall into the uncanny valley." },
  { q: "What is a 'Digital Guardian' or 'Chaperone' system in VR?", options: ["A parental control lock", "An AI assistant", "An antivirus software", "A virtual grid that appears when a user gets too close to a physical wall or obstacle to prevent injury"], a: 3, e: "Systems like Meta's 'Guardian' are vital safety features for room-scale VR to prevent physical collisions." },
  { q: "How does XR impact the environment/sustainability?", options: ["By using a lot of plastic", "It prints a lot of paper", "It harms the ozone layer", "It can drastically reduce the need for physical travel, commuting, and physical prototyping, lowering carbon footprints"], a: 3, e: "Virtual collaboration and digital twins can significantly cut down on industrial waste and corporate travel emissions." },
  { q: "What is 'Asynchronous SpaceWarp' (ASW) or 'Motion Smoothing'?", options: ["A software technique that generates synthetic frames when the PC can't maintain 90fps, preventing VR stutter", "A sci-fi game feature", "A way to warp physical space", "A type of lens"], a: 0, e: "ASW uses algorithms to guess the missing frames, keeping the visual experience smooth even if the hardware struggles." },
  { q: "What represents a major ethical concern regarding Augmented Reality glasses in public spaces?", options: ["They look weird", "They are too expensive", "The ability to secretly record video, audio, or use facial recognition on strangers without consent", "They require Wi-Fi"], a: 2, e: "Always-on cameras pointing at the public raise severe privacy and surveillance issues." },
  { q: "What is the primary goal of integrating AI with AR?", options: ["To write code", "To play chess", "To enable the glasses to intelligently understand objects, translate signs, and contextually assist the user in real-time", "To replace human vision entirely"], a: 2, e: "AI (like computer vision) provides the 'brains' for AR, allowing the system to understand what the camera is seeing." },
  { q: "What does 'Holographic Processing Unit' (HPU) refer to?", options: ["A graphics card", "A new type of RAM", "A custom coprocessor designed by Microsoft for the HoloLens to handle the massive sensor data of SLAM efficiently", "A quantum computer"], a: 2, e: "The HPU offloads the spatial mapping work from the CPU, keeping the headset running smoothly without overheating." },

  // --- Immersive Tech Formats & General Wrap-up ---
  { q: "Which format is standard for sharing 3D models across different XR platforms and web viewers?", options: ["JPEG", "MP3", "PDF", "glTF / GLB"], a: 3, e: "glTF (GL Transmission Format) is known as the 'JPEG of 3D', optimized for loading 3D scenes efficiently." },
  { q: "What does a 360-degree camera do?", options: ["Takes high-resolution flat photos", "Records audio in 3D", "Records video or images in all directions simultaneously, allowing the viewer to look around the scene later", "Tracks the user's location"], a: 2, e: "360 cameras stitch multiple wide-angle lenses together to create a spherical video for VR viewing." },
  { q: "What is the difference between 360 Video and True VR?", options: ["360 video is interactive", "There is no difference", "True VR allows 6 DoF movement around 3D objects, while 360 video is just a sphere you look around from a fixed 3 DoF point", "360 video has better graphics"], a: 2, e: "You cannot walk 'behind' an object in a 360 video, as it is just a flat spherical recording, unlike a rendered 3D VR scene." },
  { q: "What is 'Spatial Anchor Sharing'?", options: ["Allowing multiple users with different headsets to see the exact same digital object in the same physical spot (multiplayer AR)", "Sharing a boat anchor", "A type of Wi-Fi sharing", "A web development term"], a: 0, e: "Cloud anchors allow a shared coordinate system, enabling collaborative AR experiences." },
  { q: "Which Microsoft application allows workers to collaborate using avatars and spatial audio inside Microsoft Teams?", options: ["Word", "Microsoft Mesh", "Excel", "PowerPoint"], a: 1, e: "Microsoft Mesh is the enterprise mixed reality platform designed to power the corporate metaverse." },
  { q: "What is 'Photogrammetry'?", options: ["Taking photos of grams", "The process of taking hundreds of 2D photographs of a real object and using software to stitch them into a highly realistic 3D model", "A type of Instagram filter", "A VR display technique"], a: 1, e: "Photogrammetry is heavily used in XR to bring real-world artifacts (like museum statues) into VR with perfect textures." },
  { q: "What is the primary benefit of Cloud Rendering for XR?", options: ["It offloads heavy graphical processing to remote servers, allowing thin, lightweight glasses to display ultra-realistic graphics", "It uses less data", "It works without the internet", "It improves battery life offline"], a: 0, e: "Cloud XR streams the pixels directly to the headset, acting like Netflix but for interactive 3D computing." },
  { q: "Which human sense is currently the most difficult and expensive to simulate convincingly in VR?", options: ["Sight", "Hearing", "Smell", "Touch/Force Feedback"], a: 3, e: "While sight and hearing are perfected, stopping a user's physical hand from moving through a virtual table requires massive, expensive robotic exoskeletons." },
  { q: "In XR design, what does 'UI/UX' stand for?", options: ["User Interface / User Experience", "Universal Interface / Universal Experience", "Unit Info / Unit Exchange", "Unified Input / Unified eXport"], a: 0, e: "UI/UX design in XR focuses on making 3D menus intuitive and ensuring user comfort." },
  { q: "Which of the following is considered a 'Diegetic' UI element in VR?", options: ["A flat menu hovering in the air", "A score counter pinned to the screen", "A map interface that the player interacts with by looking at a physical clipboard or watch on their avatar's wrist", "A loading screen"], a: 2, e: "Diegetic interfaces exist within the game world's fiction, increasing immersion rather than breaking it with floating floating menus." },

  { q: "What is a 'Skybox' in VR development?", options: ["A physical box", "A type of cloud storage", "A large background cube or sphere wrapping the scene, painted with a texture to look like a distant sky or landscape", "A flying vehicle in a game"], a: 2, e: "Skyboxes provide the illusion of vast environments without needing to render millions of distant 3D trees or mountains." },
  { q: "Which company created the Quest line of standalone VR headsets?", options: ["Google", "Meta (formerly Facebook)", "Apple", "Sony"], a: 1, e: "Meta produces the widely popular Quest series, which dominates the standalone VR market." },
  { q: "What is the primary focus of Apple's Vision Pro headset?", options: ["Cheap gaming", "Only projecting 2D movies", "Recording audio podcasts", "Spatial Computing with seamless integration of iOS apps and high-fidelity passthrough MR"], a: 3, e: "Apple focuses on high-end 'Spatial Computing' blending digital apps into the physical workspace." },
  { q: "What is 'Peripheral Vision' and why is it important in VR?", options: ["Vision in the center of the eye", "Hearing sounds behind you", "The edge of the visual field; it detects motion and provides a sense of speed and scale, vital for immersion", "The ability to read text clearly"], a: 2, e: "A wide FOV stimulates peripheral vision, tricking the brain into believing it is truly inside the virtual world." },
  { q: "What is the 'Sweet Spot' of a VR lens?", options: ["A place to put your fingers", "The area where the battery is located", "The most comfortable part of the strap", "The center of the lens where the image is the sharpest and most clear"], a: 3, e: "Because of lens curvature, only the center provides perfect clarity. Adjusting IPD puts your pupils directly in the sweet spot." },
  { q: "What is a 'Treadmill' designed for in VR?", options: ["Cardio workouts only", "Infinite 360-degree walking and running in a confined physical space", "Generating electricity for the PC", "Calibrating the headset"], a: 1, e: "Omnidirectional VR treadmills allow players to sprint in games without hitting real walls." },
  { q: "Which of the following is a key requirement for military flight simulators using VR?", options: ["Cartoon graphics", "Exact 1:1 physical cockpit replicas matched with the VR visuals to train muscle memory", "Low resolution", "No audio"], a: 1, e: "Pilots need to physically reach out and feel the actual switches right where the VR headset shows them." },
  { q: "What does 'Cross-Reality' (XR) emphasize?", options: ["Only VR technologies", "Web development", "Database management", "The interconnectedness and spectrum of all immersive technologies (AR, MR, VR)"], a: 3, e: "XR is the umbrella term that acknowledges the blurring lines between physical and virtual realities." },
  { q: "Which psychological effect describes feeling phantom sensations when seeing your VR body get touched?", options: ["Placebo effect", "Phantom touch illusion", "Motion sickness", "Uncanny valley"], a: 1, e: "Because the brain is so immersed, seeing an object touch your avatar can cause a tingling or tactile illusion in reality." },
  { q: "Why is 'Gaze-based interaction' used in XR?", options: ["To allow hands-free selection by staring at a button until a timer fills up", "To make the user dizzy", "To record video", "To turn off the headset"], a: 0, e: "Gaze interaction is a fundamental accessibility and fallback UI technique when controllers or hands are not available." },
  
  { q: "What is 'Spatial Mapping'?", options: ["Drawing a 2D map", "The process where an MR device creates a 3D geometric representation of the physical environment", "Finding your location on Google Maps", "Connecting to Wi-Fi"], a: 1, e: "Spatial mapping turns real-world couches and walls into a 3D mesh the software can interact with." },
  { q: "Which industry uses XR for 'Exposure Therapy'?", options: ["Architecture", "Agriculture", "Automotive", "Mental Healthcare"], a: 3, e: "Mental health professionals use VR to safely expose patients to triggers for PTSD or phobias." },
  { q: "What is a 'Voxel'?", options: ["A pixel with volume (a 3D pixel) used in some 3D rendering engines like Minecraft", "A type of speaker", "A VR headset brand", "A 2D image format"], a: 0, e: "Voxels (Volumetric Pixels) are building blocks of 3D space, unlike traditional flat polygons." },
  { q: "What does 'Asymmetric VR' refer to?", options: ["A broken headset", "A game with no symmetry", "A multiplayer game where one player is in VR and others interact via a standard PC, phone, or TV", "Single-player VR"], a: 2, e: "Asymmetric games bridge the gap between people in headsets and people using normal screens in the same room." },
  { q: "How is 'Machine Learning' primarily helping AR technology?", options: ["By making the headsets heavier", "By typing code", "By playing music", "By improving computer vision, object recognition, and real-time environment tracking"], a: 3, e: "AI/ML models allow the camera to instantly recognize an apple, a chair, or a human face to augment them properly." },
  { q: "What is 'Sensor Fusion' in XR?", options: ["Melting sensors with heat", "Combining data from multiple sensors (accelerometer, gyro, camera) to calculate a more accurate position", "Connecting two headsets", "A type of battery"], a: 1, e: "No single sensor is perfect. Fusing the data eliminates errors and drift in tracking." },
  { q: "What happens if there is 'Drift' in a VR tracking system?", options: ["The user gets hot", "The controllers disconnect", "The screen turns blue", "The virtual world slowly rotates or shifts away from the physical world alignment over time"], a: 3, e: "Drift is a tracking error where the sensors lose absolute positioning, causing the virtual floor or center to slide away." },
  { q: "Which term describes a user interface anchored to the user's view, always following where they look?", options: ["World-locked UI", "Head-locked UI (or HUD)", "Body-locked UI", "Hand-locked UI"], a: 1, e: "A head-locked UI acts like a fighter pilot HUD, always staying in the center of your vision regardless of movement." },
  { q: "What is generally considered better for immersion: World-locked UI or Head-locked UI?", options: ["Head-locked UI", "World-locked UI", "They are identical", "Neither"], a: 1, e: "World-locked UI (buttons hovering in the 3D room) feels natural. Head-locked UI can feel annoying or block vision in VR." },
  { q: "Which is a major accessibility challenge in current VR?", options: ["Games are too long", "Many applications require two fully functional hands and full body mobility to complete tasks", "Headsets have no audio", "Screens are too small"], a: 1, e: "Physical requirements often exclude users with mobility impairments, pushing the industry to develop better accessibility standards." },

  { q: "What is 'Embodied Cognition' in the context of VR learning?", options: ["Learning by reading text", "A type of AI", "Learning while sleeping", "The theory that people learn and remember better when they physically use their body to perform a task in VR"], a: 3, e: "VR leverages muscle memory and spatial memory, making training much more effective than watching a video." },
  { q: "What does 'Volumetric Capture' achieve?", options: ["A flat photograph", "A 3D recording of a real person that you can walk around in XR", "A voice recording", "A text document"], a: 1, e: "It uses an array of inward-facing cameras to capture a 3D hologram of an actor or object." },
  { q: "In Unity, what component must be attached to an object to apply gravity to it?", options: ["Mesh Renderer", "Audio Source", "Rigidbody", "Light"], a: 2, e: "A Rigidbody tells the physics engine to take control of the object and apply forces like gravity." },
  { q: "What is a 'Material' in 3D computer graphics?", options: ["The physical plastic of the headset", "The code that runs the game", "A file that dictates how light interacts with a 3D surface (e.g., making it shiny, metallic, or matte)", "A 2D image"], a: 2, e: "Materials define the visual properties (roughness, metallicity) of 3D objects." },
  { q: "How does AR benefit Museum exhibits?", options: ["By locking the doors", "By providing interactive digital overlays over physical artifacts, showing them fully restored", "By dimming the lights", "By printing tickets"], a: 1, e: "AR adds deep context and interactivity to static exhibits without touching the fragile artifacts." },
  { q: "What is 'Room-scale' VR?", options: ["A tracking paradigm that allows users to freely walk around a designated play area in the real world", "A VR app about interior design", "A VR headset the size of a room", "A 3 DoF experience"], a: 0, e: "Room-scale turns your living room into the game space, requiring 6 DoF tracking and Guardian boundaries." },
  { q: "Which company is known for the HTC Vive series of headsets?", options: ["Apple", "HTC (in partnership with Valve initially)", "Samsung", "Microsoft"], a: 1, e: "The HTC Vive was one of the premier PC VR headsets that pioneered room-scale tracking." },
  { q: "What is the primary function of Google Cardboard?", options: ["To store items", "To provide a highly affordable, entry-level 3 DoF VR experience by using a smartphone as the screen and processor", "To act as an AR glass", "To charge phones"], a: 1, e: "Google Cardboard democratized VR by turning any modern smartphone into a basic headset." },
  { q: "What does 'Field of Regard' mean?", options: ["How much you respect the technology", "The total area a user can view by turning their head and body, which is 360 degrees in VR", "The screen size", "The camera resolution"], a: 1, e: "While Field of View (FOV) is what you see at one moment, Field of Regard is the total available environment around you." },
  { q: "What does a 'Refresh Rate' of 90Hz mean?", options: ["The game runs for 90 minutes", "The display draws a new image 90 times per second", "The battery lasts 90 hours", "The audio frequency is 90Hz"], a: 1, e: "A 90Hz refresh rate is widely considered the baseline for comfortable, sickness-free VR." },

  { q: "What is the purpose of 'Anti-aliasing' in XR graphics?", options: ["To speed up rendering", "To change the lighting", "To smooth out the jagged, 'stair-step' edges of 3D objects, improving visual realism", "To add sound effects"], a: 2, e: "Because VR screens are close to the eyes, jagged pixels (aliasing) are very distracting. Anti-aliasing softens these edges." },
  { q: "Which technique uses AI to upscale lower-resolution images in real-time to save GPU power in XR?", options: ["Ray Tracing", "Photogrammetry", "Rigging", "DLSS (Deep Learning Super Sampling) or FSR"], a: 3, e: "Technologies like DLSS render the game at a low resolution and use AI to make it look high-res, crucial for VR performance." },
  { q: "What is the main limitation of smartphone-based AR?", options: ["It requires holding the phone up, tying up the user's hands", "It doesn't have a screen", "It requires a tethered PC", "It only works in the dark"], a: 0, e: "Handheld AR is less immersive and practical for long tasks compared to wearable AR glasses." },
  { q: "Which Microsoft device heavily targets Enterprise, Military, and Medical fields rather than consumer gaming?", options: ["Xbox VR", "HoloLens 2", "Kinect", "Surface Pro"], a: 1, e: "HoloLens 2 is an expensive, high-end MR device built specifically for frontline workers and enterprises." },
  { q: "In the context of the Metaverse, what is a 'Virtual Economy'?", options: ["A video game about banking", "A cheap headset", "An economic system where users buy, sell, and trade digital goods (like avatar clothing or digital land) using currencies", "A free software license"], a: 2, e: "Virtual economies are fundamental to the Metaverse, allowing creators to monetize digital assets." },
  { q: "What is 'Spatial Audio' designed to mimic?", options: ["A radio broadcast", "How human ears perceive sounds originating from specific distances and 3D directions in the real world", "Underwater sounds", "A flat stereo track"], a: 1, e: "By adjusting volume, delay, and frequency, spatial audio tricks the brain into hearing a sound exactly where a virtual object is." },
  { q: "Why is 'IP (Intellectual Property) Theft' a concern in the Metaverse?", options: ["Because hardware is easy to steal", "Because internet speeds are too high", "Because digital models, brands, and virtual designs can be easily copied and distributed by unauthorized users", "Because VR headsets record audio"], a: 2, e: "Protecting digital creations (clothes, 3D art, brand logos) in a decentralized 3D world is a major legal challenge." },
  { q: "What does 'Multi-User' capability refer to in XR applications?", options: ["Using multiple keyboards", "Running multiple apps at once", "Having multiple screens", "Allowing several people to enter, see, and interact within the same virtual or augmented environment simultaneously"], a: 3, e: "Multi-user XR enables collaborative meetings, multiplayer gaming, and shared architectural reviews." },
  { q: "What is 'Cinematic VR'?", options: ["A game with cutscenes", "A movie theater showing 2D films", "Live-action 360-degree video experiences meant to be watched like a movie rather than fully interacted with", "A headset used by directors"], a: 2, e: "Cinematic VR focuses on storytelling through spherical video rather than interactive computer graphics." },
  { q: "Ultimately, what is the 'Holy Grail' of XR hardware?", options: ["A massive room-sized computer", "Lightweight, wireless glasses that look like normal eyewear but can instantly switch between full VR and transparent AR", "A headset that requires no battery", "A smartphone app"], a: 1, e: "The industry is striving to shrink the technology down to the size of standard prescription glasses without sacrificing power." }

        ];

        let currentIdx = 0, score = 0, answered = false;

        function startQuiz() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            loadQuestion();
        }

        function loadQuestion() {
            const q = questions[currentIdx];
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('progress-text').innerText = `Question ${currentIdx + 1}/50`;
            document.getElementById('progress-bar').style.width = `${((currentIdx + 1) / 50) * 100}%`;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-4 rounded-2xl border-2 border-slate-100 hover:border-rose-200 hover:bg-rose-50 font-medium text-sm text-slate-700 transition-all";
                btn.innerText = opt;
                btn.onclick = () => selectOption(i, btn);
                container.appendChild(btn);
            });
            document.getElementById('explanation-box').classList.add('hidden');
            document.getElementById('next-btn').classList.add('hidden');
            answered = false;
        }

        function selectOption(idx, btn) {
            if (answered) return;
            answered = true;
            const q = questions[currentIdx];
            const allBtns = document.querySelectorAll('#options-container button');
            if (idx === q.a) {
                score++;
                btn.classList.add('border-green-500', 'bg-green-50', 'text-green-700');
                document.getElementById('score-text').innerText = `Score: ${score}`;
            } else {
                btn.classList.add('border-red-500', 'bg-red-50', 'text-red-700');
                allBtns[q.a].classList.add('border-green-500', 'bg-green-50', 'text-green-700');
            }
            const exp = document.getElementById('explanation-box');
            exp.innerHTML = `<strong>Explanation:</strong> ${q.e}`;
            exp.classList.remove('hidden');
            document.getElementById('next-btn').classList.remove('hidden');
        }

        function nextQuestion() {
            if (currentIdx < questions.length - 1) {
                currentIdx++;
                loadQuestion();
            } else {
                document.getElementById('quiz-screen').classList.add('hidden');
                document.getElementById('result-screen').classList.remove('hidden');
                document.getElementById('final-score').innerText = score;
            }
        }
    </script>
