<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit 4 Cyber Security Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col p-4">
        <!-- Start Screen -->
        <div id="start-screen" class="flex-1 flex flex-col justify-center items-center text-center">
            <div class="w-24 h-24 bg-rose-100 rounded-3xl flex items-center justify-center mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 text-rose-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
            </div>
            <h1 class="text-3xl font-bold text-slate-800 mb-2">Unit 4 Quiz</h1>
            <p class="text-slate-500 mb-8 font-medium italic">Cyber Security & Ethics (150 MCQs)</p>
            <button onclick="startQuiz()" class="w-full bg-rose-600 text-white py-4 rounded-2xl font-bold text-lg shadow-lg hover:bg-rose-700 mb-4 transition-colors">Start Solving</button>
            <a href="index.html" class="text-rose-600 font-bold underline hover:text-rose-800 transition-colors">← Go back</a>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="hidden flex-1 flex flex-col">
            <div class="mb-6">
                <div class="flex justify-between items-center mb-2">
                    <span id="progress-text" class="text-xs font-bold text-slate-400 uppercase tracking-widest">Question 1/150</span>
                    <span id="score-text" class="bg-rose-50 text-rose-600 px-3 py-1 rounded-full text-xs font-bold">Score: 0</span>
                </div>
                <div class="h-2 w-full bg-slate-200 rounded-full overflow-hidden"><div id="progress-bar" class="h-full bg-rose-500 transition-all duration-300" style="width: 2%"></div></div>
            </div>
            <h2 id="question-text" class="text-xl font-bold text-slate-800 mb-6 leading-snug"></h2>
            <div id="options-container" class="space-y-3 mb-6"></div>
            <div id="explanation-box" class="hidden mb-6 p-4 bg-slate-900 rounded-2xl text-slate-300 text-sm italic border-l-4 border-rose-500"></div>
            <button id="next-btn" onclick="nextQuestion()" class="hidden w-full bg-slate-800 text-white py-4 rounded-2xl font-bold text-lg shadow-md mt-auto hover:bg-slate-700 transition-colors">Next Question</button>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="hidden flex-1 flex flex-col justify-center items-center text-center">
            <h2 class="text-3xl font-black text-slate-800 mb-8">Results</h2>
            <div class="bg-white p-8 rounded-3xl border border-slate-200 w-full mb-8">
                <p id="final-score" class="text-6xl font-black text-rose-600 mb-2">0</p>
                <p id="final-total" class="text-xs font-bold text-slate-400 uppercase">Correct out of 150</p>
            </div>
            <button onclick="location.reload()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold mb-4 hover:bg-slate-800 transition-colors">Retry Quiz</button>
            <a href="index.html" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold text-center hover:bg-blue-700 transition-colors">← Home</a>
        </div>
    </div>

    <script>
        const questions = [
            // Part 1: Fundamentals & CIA Triad (1-20)
            { q: "What is the primary goal of Cyber Security?", options: ["Increasing internet speed", "Protecting systems, networks, and data from digital attacks", "Selling computer hardware", "Developing social media apps"], a: 1, e: "Cyber security focuses on protecting electronic data and systems from malicious attacks." },
            { q: "Which of the following makes up the CIA Triad in information security?", options: ["Confidentiality, Integrity, Availability", "Computing, Internet, Access", "Cyber, Intelligence, Analytics", "Control, Identity, Authorization"], a: 0, e: "The CIA Triad is the core foundation of information security." },
            { q: "What does 'Confidentiality' ensure in the CIA Triad?", options: ["Data is accessible when needed", "Data cannot be modified", "Data is accessed only by authorized individuals", "Data is backed up daily"], a: 2, e: "Confidentiality ensures privacy and prevents unauthorized disclosure." },
            { q: "Which core principle is violated if a hacker alters the amount of money in a bank transfer?", options: ["Availability", "Confidentiality", "Integrity", "Authenticity"], a: 2, e: "Integrity is compromised when data is improperly modified or tampered with." },
            { q: "A Denial-of-Service (DDoS) attack primarily targets which aspect of the CIA Triad?", options: ["Availability", "Confidentiality", "Integrity", "Non-repudiation"], a: 0, e: "DDoS attacks overwhelm servers so legitimate users cannot access them, breaking Availability." },
            { q: "What does 'Authentication' verify?", options: ["The identity of a user or system", "The speed of the network", "The physical location of a server", "The file size of an email"], a: 0, e: "Authentication ensures that a user is who they claim to be." },
            { q: "What is 'Non-repudiation' in cyber security?", options: ["Preventing users from accessing websites", "Ensuring a party cannot deny the authenticity of their signature or sending a message", "Blocking malware", "Encrypting hard drives"], a: 1, e: "Non-repudiation provides proof of the origin and integrity of data." },
            { q: "Which concept refers to the weakness in an information system that can be exploited?", options: ["Threat", "Vulnerability", "Risk", "Exploit"], a: 1, e: "A vulnerability is a flaw or weakness in system security procedures, design, or implementation." },
            { q: "What is a 'Threat' in cyber security terminology?", options: ["A software patch", "A known weakness", "Any potential danger that can compromise confidentiality, integrity, or availability", "A strong password"], a: 2, e: "A threat is any circumstance or event with the potential to adversely impact an IS." },
            { q: "How is 'Risk' calculated in cyber security?", options: ["Threat x Vulnerability", "Confidentiality + Integrity", "Hardware / Software", "Phishing x Malware"], a: 0, e: "Risk is the potential for loss, calculated by multiplying the threat probability by the vulnerability impact." },
            { q: "What is an 'Exploit'?", options: ["A type of antivirus", "A secure password manager", "Software or code that takes advantage of a vulnerability to cause unintended behavior", "A backup protocol"], a: 2, e: "Exploits are tools or scripts used by hackers to leverage vulnerabilities." },
            { q: "Which term describes a deliberate attempt to evade security services and violate security policy?", options: ["An Attack", "A Vulnerability", "A Patch", "A Protocol"], a: 0, e: "An attack is an intentional act to bypass security controls." },
            { q: "What is a 'Zero-Day' vulnerability?", options: ["A virus that deletes all data in zero days", "A software flaw that is unknown to the vendor and has no patch available", "A weak password", "A firewall configuration error"], a: 1, e: "Zero-Day vulnerabilities are highly dangerous because developers have had zero days to fix them." },
            { q: "Which of the following represents 'Physical Security'?", options: ["Antivirus software", "Encryption", "Biometric locks on a server room door", "A strong Wi-Fi password"], a: 2, e: "Physical security prevents unauthorized physical access to hardware and facilities." },
            { q: "What is the primary purpose of 'Access Control'?", options: ["To speed up login times", "To limit access to information system resources only to authorized users", "To prevent hardware failure", "To monitor internet speed"], a: 1, e: "Access control ensures only authorized users can view or modify specific data." },
            { q: "The principle of giving users only the minimum permissions needed to perform their job is called:", options: ["Maximum Security", "Zero Trust", "Principle of Least Privilege", "Data Minimization"], a: 2, e: "Least Privilege reduces the attack surface by limiting user capabilities." },
            { q: "What is a 'Payload' in cyber security?", options: ["The weight of a server", "The part of the malware that performs the malicious action", "A payment made to a hacker", "A network packet header"], a: 1, e: "The payload is the actual malicious code that executes the intended damage or theft." },
            { q: "Which of the following is considered an Insider Threat?", options: ["A foreign state-sponsored hacker", "A disgruntled employee leaking company data", "A random internet script kiddie", "A lightning strike causing a power outage"], a: 1, e: "Insider threats originate from people within the organization, such as employees or contractors." },
            { q: "What is 'Defense in Depth'?", options: ["Using a single, very strong password", "A strategy that uses multiple layers of security controls to protect data", "Burying servers underground", "Only using open-source software"], a: 1, e: "Defense in Depth layers firewalls, antivirus, encryption, and policies so if one fails, others remain." },
            { q: "What does 'Data at Rest' refer to?", options: ["Data actively moving across a network", "Data loaded in RAM", "Data stored persistently on a hard drive or storage media", "Data being spoken over a phone"], a: 2, e: "Data at rest is inactive data stored physically in databases or disks." },

            // Part 2: Hackers & Cyber Attacks (21-50)
            { q: "Hackers who use their skills to find vulnerabilities and report them legally are called:", options: ["Black Hat Hackers", "White Hat Hackers", "Script Kiddies", "Gray Hat Hackers"], a: 1, e: "White Hat hackers (Ethical Hackers) work with permission to improve security." },
            { q: "What defines a 'Script Kiddie'?", options: ["An inexperienced attacker who uses pre-written tools to launch attacks", "A hacker who writes advanced custom scripts", "A highly paid corporate security tester", "A government-sponsored cyber spy"], a: 0, e: "Script Kiddies lack deep technical knowledge and rely on software created by others." },
            { q: "A hacker who breaks into a system without permission but does not cause damage, often to show off, is a:", options: ["White Hat Hacker", "Gray Hat Hacker", "Black Hat Hacker", "Red Hat Hacker"], a: 1, e: "Gray Hat hackers operate illegally but generally do not have malicious intent." },
            { q: "What is a 'Hacktivist'?", options: ["A hacker who only targets hardware", "A hacker who steals money from banks", "A hacker who breaks into systems to promote a political or social cause", "An automated AI hacking bot"], a: 2, e: "Hacktivists use cyber attacks to protest or drive political messaging." },
            { q: "What is an 'Advanced Persistent Threat' (APT)?", options: ["A quick virus attack", "A prolonged, targeted cyberattack where an intruder remains undetected for a long time", "A spam email campaign", "A weak password policy"], a: 1, e: "APTs are usually state-sponsored or highly organized groups seeking to steal data continuously." },
            { q: "State-sponsored hackers are primarily motivated by:", options: ["Financial theft", "Espionage, intelligence gathering, and cyber warfare", "Personal fame", "Testing their own security"], a: 1, e: "Nation-states use hackers to steal military secrets, intellectual property, or disrupt enemy infrastructure." },
            { q: "What is the first phase of an ethical hacking process?", options: ["Scanning", "Gaining Access", "Reconnaissance (Footprinting)", "Clearing Tracks"], a: 2, e: "Reconnaissance involves gathering as much information about the target as possible before attacking." },
            { q: "Which phase of hacking involves actively probing the target network for open ports and vulnerabilities?", options: ["Reconnaissance", "Scanning", "Maintaining Access", "Reporting"], a: 1, e: "Scanning uses tools like Nmap to find active machines and vulnerable services." },
            { q: "What does 'Clearing Tracks' mean in the hacking cycle?", options: ["Deleting malware", "Deleting log files and evidence to avoid detection by investigators", "Formatting the hacker's own computer", "Encrypting the target's data"], a: 1, e: "Attackers delete system logs so forensic investigators cannot trace the breach back to them." },
            { q: "A Man-in-the-Middle (MitM) attack involves:", options: ["Guessing passwords", "Encrypting a hard drive", "Intercepting and altering communication between two parties secretly", "Flooding a server"], a: 2, e: "In a MitM attack, the hacker secretly relays and possibly alters communications between two parties." },
            { q: "What is 'Session Hijacking'?", options: ["Stealing a computer monitor", "Taking over a user's active web session by stealing their session cookie", "Guessing a Wi-Fi password", "Blocking a user from logging in"], a: 1, e: "If an attacker steals a valid session cookie, they can access the web application as the victim." },
            { q: "Which attack involves sending excessive traffic to a server to make it crash or become unavailable?", options: ["SQL Injection", "Denial of Service (DoS)", "Phishing", "Eavesdropping"], a: 1, e: "DoS attacks consume server resources, denying access to legitimate users." },
            { q: "How does a Distributed Denial of Service (DDoS) attack differ from a DoS attack?", options: ["It uses a botnet of multiple compromised computers to launch the attack", "It only targets databases", "It uses physical damage", "It encrypts files"], a: 0, e: "DDoS utilizes thousands of compromised devices (a botnet) to overwhelm the target." },
            { q: "What is an 'OS Downgrade Attack'?", options: ["Upgrading an OS to a beta version", "Deleting the OS entirely", "Forcing a system to revert to an older, vulnerable operating system version", "Installing a fake OS"], a: 2, e: "Attackers force downgrades to re-introduce known vulnerabilities that were fixed in updates." },
            { q: "Which type of hacking targets the permanent software programmed into a read-only memory?", options: ["Application Hacking", "Network Hacking", "Firmware Hacking", "Social Engineering"], a: 2, e: "Firmware hacking targets the low-level software that controls hardware devices, like router firmware." },
            { q: "A 'Brute Force' attack is primarily used to:", options: ["Systematically guess all possible combinations of a password", "Physically break a server", "Send spam emails", "Inject SQL code"], a: 0, e: "Brute forcing tries every possible password combination until it finds the correct one." },
            { q: "What is a 'Dictionary Attack'?", options: ["Throwing a book at a server", "Using a pre-compiled list of common words to guess a password", "Translating website text to insert malware", "Stealing email addresses"], a: 1, e: "Dictionary attacks are faster than brute force because they only try known words and common passwords." },
            { q: "What does 'MAC Spoofing' involve?", options: ["Faking an Apple computer", "Changing the factory-assigned Media Access Control address of a network interface to bypass filters", "Stealing an IP address", "Sending fake emails"], a: 1, e: "MAC spoofing tricks network switches into allowing a malicious device to connect by mimicking a trusted MAC address." },
            { q: "Which attack relies on predicting or intercepting a TCP sequence number to impersonate a trusted host?", options: ["IP Spoofing", "DNS Poisoning", "TCP Session Hijacking", "Cross-Site Scripting"], a: 2, e: "TCP hijacking allows an attacker to take over an established TCP connection." },
            { q: "What is the purpose of 'DNS Spoofing' (DNS Poisoning)?", options: ["To speed up web browsing", "To redirect legitimate web traffic to a malicious, fake website", "To encrypt emails", "To bypass antivirus software"], a: 1, e: "DNS spoofing corrupts the DNS cache, routing users to fake websites even if they type the correct URL." },
            { q: "What is 'Penetration Testing' (Pen Testing)?", options: ["Writing new software", "Testing internet speed", "An authorized simulated cyberattack to evaluate system security", "Replacing hardware"], a: 2, e: "Pen testing identifies vulnerabilities legally before malicious hackers can exploit them." },
            { q: "Which of the following is NOT an ethical hacking phase?", options: ["Reconnaissance", "Scanning", "Maintaining Access maliciously for extortion", "Reporting"], a: 2, e: "Ethical hackers report vulnerabilities rather than maliciously maintaining access for extortion." },
            { q: "What is 'Bug Bounty' hunting?", options: ["Hunting animals using drones", "A program where organizations reward independent hackers for legally finding and reporting security flaws", "Selling malware on the dark web", "Spamming email accounts"], a: 1, e: "Bug bounties incentivize white hat hackers to improve an organization's security posture safely." },
            { q: "What is a 'Botnet'?", options: ["A robot used in manufacturing", "A network of malware-infected computers controlled centrally by a hacker", "A secure internal network", "A type of antivirus algorithm"], a: 1, e: "Botnets are used to launch massive DDoS attacks or send millions of spam emails." },
            { q: "Which attack targets the human element rather than technical vulnerabilities?", options: ["Buffer Overflow", "SQL Injection", "Social Engineering", "Port Scanning"], a: 2, e: "Social engineering tricks people into breaking security protocols and giving away information." },
            { q: "If an attacker exploits a flaw in a web application's login page, it is classified as:", options: ["Firmware Hacking", "Application Hacking", "Hardware Hacking", "Physical Hacking"], a: 1, e: "Application hacking targets the software layer, such as web apps and databases." },
            { q: "What is the 'Dark Web'?", options: ["A website with a black background", "A part of the internet that isn't indexed by search engines and requires special software (like Tor) to access", "A broken internet connection", "The server room with the lights off"], a: 1, e: "The Dark Web is often used by cybercriminals to buy and sell stolen data, malware, and illegal goods." },
            { q: "What does 'Privilege Escalation' mean?", options: ["Getting a promotion at work", "An attacker exploiting a bug to gain higher-level administrative access than they initially had", "Increasing internet bandwidth", "Upgrading server hardware"], a: 1, e: "Attackers often start as a standard user and escalate to 'Root' or 'Admin' to take full control." },
            { q: "A 'Watering Hole' attack involves:", options: ["Flooding a server room with water", "Infecting a website commonly visited by a specific target group to infect their computers", "Stealing water utility data", "Dropping USB drives in a parking lot"], a: 1, e: "Attackers compromise a specific site (like an industry forum) knowing their targets will visit it." },
            { q: "What is 'Shoulder Surfing'?", options: ["Watching someone type their password or PIN over their shoulder", "A type of physical exercise", "Surfing the internet anonymously", "Stealing a physical laptop"], a: 0, e: "Shoulder surfing is a direct, physical observation technique to steal credentials." },

            // Part 3: Malware & Exploits (51-80)
            { q: "What type of malware disguises itself as legitimate software to trick users into installing it?", options: ["Ransomware", "Worm", "Trojan Horse", "Adware"], a: 2, e: "Trojans appear benign or useful but contain hidden malicious code." },
            { q: "Which type of malware can self-replicate and spread across networks without any human interaction?", options: ["Trojan", "Spyware", "Keylogger", "Worm"], a: 3, e: "Unlike viruses, Worms do not need a host file or user action to spread." },
            { q: "What defines a Computer Virus?", options: ["Malware that requires a host file and human interaction to replicate and spread", "A biological infection", "Hardware malfunction", "Malware that spreads without human help"], a: 0, e: "A virus attaches itself to clean files and infects other files when a user runs the infected program." },
            { q: "What does 'Ransomware' do?", options: ["Displays unwanted advertisements", "Encrypts the victim's files and demands payment for the decryption key", "Speeds up the computer", "Steals Wi-Fi passwords"], a: 1, e: "Ransomware locks users out of their own data until a financial ransom is paid." },
            { q: "Identify the attack: A gang encrypts a company's data, steals a copy of it, and threatens to publish the data online if unpaid.", options: ["Application hacking", "Firmware exploit", "Network hacking – Ransomware 2.0", "OS downgrade attack"], a: 2, e: "Ransomware 2.0 involves double extortion: encrypting data AND threatening to leak the stolen data." },
            { q: "What is the primary function of 'Spyware'?", options: ["To delete files", "To secretly monitor user behavior, keystrokes, and collect personal information", "To display pop-up ads", "To replicate across networks"], a: 1, e: "Spyware gathers data without consent and sends it to third parties." },
            { q: "Which device or software is used to monitor user keystrokes to steal passwords?", options: ["Firewall", "Keylogger", "Antivirus", "VPN"], a: 1, e: "Keyloggers secretly record every keystroke pressed on a keyboard." },
            { q: "What is a 'Rootkit'?", options: ["A tool for gardening", "Malware designed to hide its existence and provide continued, privileged access to a computer", "A type of firewall", "A secure password generator"], a: 1, e: "Rootkits embed deeply in the OS, hiding themselves from antivirus software while maintaining admin control." },
            { q: "What is 'Adware'?", options: ["Software that automatically downloads and displays unwanted advertisements", "A virus that destroys hardware", "A tool to block ads", "Software that encrypts files"], a: 0, e: "Adware generates revenue for its developer by aggressively serving unwanted ads." },
            { q: "What is a 'Logic Bomb'?", options: ["A physical explosive", "A debate technique", "Malicious code that lies dormant until a specific condition or date is met", "A bug in a calculator app"], a: 2, e: "Logic bombs execute their payload only when triggered by specific circumstances, like a fired employee's termination date." },
            { q: "An attacker injects malicious scripts into a web page viewed by other users. What type of attack is this?", options: ["SQL Injection", "DDoS", "Cross-Site Scripting (XSS)", "Buffer Overflow"], a: 2, e: "XSS occurs when malicious scripts are injected into otherwise benign and trusted websites." },
            { q: "What does an SQL Injection (SQLi) attack target?", options: ["The user's monitor", "The network router", "The physical hardware", "A backend database through input fields on a website"], a: 3, e: "SQLi manipulates backend databases by inserting malicious SQL statements into entry fields." },
            { q: "What is a 'Buffer Overflow' attack?", options: ["Flooding a network with data", "Sending more data to a program's memory block than it can handle, causing a crash or arbitrary code execution", "Filling up a hard drive", "A slow internet connection"], a: 1, e: "Buffer overflows overwrite adjacent memory, allowing attackers to execute their own malicious code." },
            { q: "Which vulnerability allows an attacker to include a file, usually exploiting a 'dynamic file inclusion' mechanism in web apps?", options: ["LFI / RFI (Local/Remote File Inclusion)", "SQLi", "XSS", "DDoS"], a: 0, e: "File inclusion vulnerabilities allow attackers to execute remote malicious scripts or read sensitive local files." },
            { q: "What is 'Cross-Site Request Forgery' (CSRF)?", options: ["Forging physical signatures", "Tricking an authenticated user's browser into executing an unwanted action on a trusted site", "Stealing a database", "Guessing passwords"], a: 1, e: "CSRF exploits the trust a web application has in an authenticated user's browser." },
            { q: "What does a 'Dropper' do in the context of malware?", options: ["Drops network packets to slow internet", "A small program designed specifically to install other malware payload onto the target system", "Deletes files permanently", "Repairs corrupted files"], a: 1, e: "Droppers are stealthy programs used to bypass antivirus and secretly download the main malware." },
            { q: "What is a 'Polymorphic Virus'?", options: ["A virus that only infects polygons", "A virus that changes its underlying code signature every time it infects a new file to evade antivirus detection", "A virus that turns into a worm", "A virus that destroys hardware"], a: 1, e: "Polymorphism makes signature-based antivirus detection extremely difficult." },
            { q: "What is 'Crimeware'?", options: ["Software used by police to solve crimes", "Malware specifically designed to automate cybercrime, such as stealing financial data or identities", "A video game about crime", "A secure messaging app"], a: 1, e: "Crimeware is a class of malware designed explicitly for lucrative illegal activities." },
            { q: "A piece of code embedded in hardware that allows unauthorized access is known as a:", options: ["Hardware Trojan / Backdoor", "Software Patch", "Firmware Update", "Logic Gate"], a: 0, e: "Hardware backdoors are physically built into chips or devices, making them incredibly hard to detect." },
            { q: "What is 'Typosquatting'?", options: ["Sitting incorrectly at a desk", "Registering domain names very similar to popular sites (e.g., goggle.com) to distribute malware or phish", "Typing passwords too fast", "A type of SQL injection"], a: 1, e: "Typosquatting targets users who accidentally misspell URLs." },

            // Part 4: Social Engineering & AI Exploits (81-100)
            { q: "What is 'Social Engineering' in the context of cyber security?", options: ["Writing software for social media", "Manipulating people into breaking normal security procedures and giving up confidential information", "Engineering stronger firewalls", "Creating fake social media profiles"], a: 1, e: "Social engineering exploits human psychology rather than technical hacking techniques." },
            { q: "What is 'Phishing'?", options: ["Catching fish online", "Sending fraudulent emails pretending to be from a reputable source to steal credentials or install malware", "Encrypting a hard drive", "Blocking network traffic"], a: 1, e: "Phishing uses deceptive emails to trick users into clicking malicious links or attachments." },
            { q: "What is 'Spear Phishing'?", options: ["A targeted phishing attack aimed at a specific individual or organization using personalized information", "A mass email sent to millions of random people", "Attacking a server with physical weapons", "Stealing Wi-Fi passwords"], a: 0, e: "Unlike standard phishing, Spear Phishing uses highly personalized information to make the scam convincing." },
            { q: "What is 'Whaling'?", options: ["A phishing attack specifically targeting high-profile executives like CEOs or CFOs", "Saving ocean life", "A massive DDoS attack", "A physical break-in"], a: 0, e: "Whaling goes after the 'big fish' who have high-level access and financial authority." },
            { q: "What is 'Vishing'?", options: ["Video phishing", "Voice phishing, using phone calls to deceive victims into providing sensitive information", "A type of malware", "Virtual routing"], a: 1, e: "Vishing (Voice Phishing) relies on verbal deception over phone calls." },
            { q: "What is 'Smishing'?", options: ["Smashing a hard drive", "Phishing conducted via SMS text messaging", "A type of social media attack", "Smiling at a security camera"], a: 1, e: "Smishing uses malicious text messages to steal data or distribute malware." },
            { q: "If an attacker uses a deep fake voice to trick a bank employee into transferring money, this attack is classified as:", options: ["Network phishing", "Firmware attack", "Social engineering with AI exploit", "OS downgrade attack"], a: 2, e: "Using AI (like deepfakes) to manipulate human psychology is an advanced form of Social Engineering." },
            { q: "A company discovers employees are receiving AI-generated phishing emails. Which type of hacking is this predominantly related to?", options: ["OS hacking", "Social Engineering / Application hacking", "Firmware hacking", "Hardware hacking"], a: 1, e: "Phishing targets human psychology (Social Engineering) and often exploits email applications." },
            { q: "What does 'Pharming' involve?", options: ["Planting crops using AI", "Redirecting a website's traffic to a fake, fraudulent site even if the user typed the correct URL", "Stealing credit cards physically", "Guessing passwords"], a: 1, e: "Pharming often involves poisoning the DNS cache to silently reroute users to malicious websites." },
            { q: "When a hacker follows an authorized person through a secure physical door without badging in, it is called:", options: ["Piggybacking / Tailgating", "Door Sniffing", "Physical Spoofing", "Shoulder Surfing"], a: 0, e: "Tailgating exploits human politeness (holding the door) to bypass physical security." },
            { q: "What is 'Baiting' in social engineering?", options: ["Sending fake emails", "Leaving a malware-infected USB drive in a parking lot, hoping a curious employee plugs it in", "Calling someone pretending to be IT support", "Following someone through a secure door"], a: 1, e: "Baiting uses physical media and human curiosity to bypass digital security." },
            { q: "What is 'Pretexting'?", options: ["Texting before calling", "Creating a fabricated scenario (a pretext) to engage a victim and extract information", "Writing code in plain text", "Testing network speed"], a: 1, e: "Pretexting involves building trust through a false identity or situation (e.g., pretending to be a bank auditor)." },
            { q: "What is 'Quid Pro Quo' in social engineering?", options: ["A type of malware", "Offering a benefit or service (like fake IT support) in exchange for information or access", "Threatening physical harm", "Stealing a laptop"], a: 1, e: "Quid pro quo translates to 'something for something', exchanging fake help for real passwords." },
            { q: "How is Machine Learning commonly used defensively in Cyber Security?", options: ["To write malware faster", "To analyze network traffic patterns and detect anomalies in real-time", "To generate deepfakes", "To bypass passwords automatically"], a: 1, e: "Defensive AI learns what 'normal' traffic looks like to instantly flag suspicious behavior." },
            { q: "What is a 'Deepfake' in the context of cyber threats?", options: ["A deep underwater cable", "Highly realistic AI-generated audio or video used to impersonate someone else", "A type of secure password", "A deep scan by an antivirus"], a: 1, e: "Deepfakes are used to bypass biometric authentication or conduct highly convincing social engineering attacks." },
            { q: "Why are AI-generated phishing emails more dangerous than traditional ones?", options: ["They contain more viruses", "They are created faster, lack traditional grammatical errors, and are highly personalized at scale", "They bypass firewalls automatically", "They use larger fonts"], a: 1, e: "AI tools like LLMs allow attackers to write flawless, highly convincing phishing lures effortlessly." },
            { q: "What is 'Credential Stuffing'?", options: ["Writing passwords on a sticky note", "Using automated tools to inject stolen username/password pairs from one breach into the login pages of other websites", "Stuffing a server with data", "A type of physical theft"], a: 1, e: "Credential stuffing exploits the fact that many users reuse the same password across multiple sites." },
            { q: "Which psychological trigger is most commonly exploited in Social Engineering?", options: ["Happiness", "Boredom", "Urgency/Fear", "Patience"], a: 2, e: "Creating a false sense of urgency or fear (e.g., 'Your account will be suspended!') forces victims to act without thinking." },
            { q: "What is 'Dumpster Diving'?", options: ["A swimming technique", "Physically searching through an organization's trash to find discarded documents containing sensitive information", "A network scanning tool", "A cloud storage vulnerability"], a: 1, e: "Dumpster diving highlights the need for proper physical document shredding protocols." },
            { q: "What is the best defense against Social Engineering attacks?", options: ["Installing more RAM", "Employee security awareness training and strict verification protocols", "Using a VPN", "Upgrading to Windows 11"], a: 1, e: "Since social engineering targets humans, educating humans is the most effective defense." },

            // Part 5: Digital Forensics & Investigation (101-120)
            { q: "What is 'Digital Forensics'?", options: ["Deleting digital footprints", "The process of recovering, investigating, and preserving digital evidence for legal purposes", "Hacking into competitor databases", "Creating backup files"], a: 1, e: "Digital Forensics applies investigative techniques to digital devices to uncover evidence of crimes." },
            { q: "A forensic investigator is analyzing encrypted ransomware files. The encryption key was deleted. To prove the case in court, which forensic step is most critical?", options: ["Collection", "Eradication", "Preservation / Chain of custody", "Decryption"], a: 2, e: "Chain of Custody proves that evidence was not tampered with from the moment it was collected until it is presented in court." },
            { q: "Which of the following is a volatile memory that a forensic investigator must capture before a computer is turned off?", options: ["Hard Drive", "CD-ROM", "USB Flash Drive", "RAM (Random Access Memory)"], a: 3, e: "RAM is volatile, meaning all data is lost the moment the system loses power." },
            { q: "What is the purpose of 'Hashing' (e.g., MD5, SHA-256) in digital forensics?", options: ["To speed up the computer", "To encrypt the investigator's files", "To create a unique digital fingerprint of a file to prove its integrity has not changed", "To compress large files"], a: 2, e: "If the hash of a copied forensic image matches the original drive, it proves the data is an exact, untampered duplicate." },
            { q: "In the cyber forensic investigation process, what comes immediately after 'Collection'?", options: ["Presentation", "Destruction", "Apprehension", "Preservation / Examination"], a: 3, e: "Evidence must be preserved securely before it is examined to ensure it is admissible in court." },
            { q: "What is 'Forensic Imaging' (Bit-by-Bit Copy)?", options: ["Taking photos of the crime scene", "Creating an exact, sector-by-sector duplicate of a hard drive, including deleted files and unallocated space", "Copying files to a USB drive normally", "Drawing a sketch of the suspect"], a: 1, e: "Forensic images capture everything on a drive, whereas a normal file copy misses hidden or deleted data." },
            { q: "Why should a forensic investigator never perform analysis on the original hard drive?", options: ["Because it is too slow", "To ensure the original evidence remains completely unaltered and legally admissible", "Because it uses too much electricity", "Because the computer might explode"], a: 1, e: "Booting or interacting with the original drive alters timestamps and data, ruining its evidentiary value." },
            { q: "What is a 'Write Blocker'?", options: ["A tool that prevents a writer from working", "A hardware or software tool used to prevent any data from being written to or altered on a suspect's hard drive during imaging", "A type of firewall", "A secure messaging app"], a: 1, e: "Write blockers ensure the forensic imaging process is entirely read-only." },
            { q: "What is 'Steganalysis'?", options: ["Analyzing dinosaur bones", "The process of detecting and extracting hidden messages that were concealed using steganography", "Analyzing network speeds", "A type of encryption"], a: 1, e: "Steganalysis looks for statistical anomalies in images or audio files to find hidden data." },
            { q: "Which term refers to the chronological documentation showing the seizure, custody, control, transfer, and analysis of physical or electronic evidence?", options: ["Hash Value", "Chain of Custody", "Digital Certificate", "Incident Response Plan"], a: 1, e: "A broken Chain of Custody can result in evidence being thrown out of court." },
            { q: "What does 'Unallocated Space' on a hard drive contain?", options: ["Only the operating system", "Space currently available for new data, which may still contain fragments of previously deleted files", "Cloud backups", "Encrypted passwords"], a: 1, e: "When a file is 'deleted', the OS just marks its space as unallocated. Forensics can often recover data from this space." },
            { q: "What is the 'Order of Volatility' in digital forensics?", options: ["The order in which an explosive detonates", "A sequence dictating that evidence should be collected starting with the most fragile (volatile) data first, like RAM", "Alphabetical sorting of files", "The speed of the network connection"], a: 1, e: "Investigators must capture RAM and cache data before looking at permanent hard drive data." },
            { q: "What is an 'Incident Response Plan' (IRP)?", options: ["A plan for a party", "A set of documented procedures detailing how an organization should respond to and manage a cyberattack", "A map of the building", "A list of employee passwords"], a: 1, e: "An IRP minimizes damage and recovery time during a cyber incident." },
            { q: "Which of the following is NOT a phase of Incident Response?", options: ["Preparation", "Identification", "Eradication", "Marketing"], a: 3, e: "Marketing is not part of incident response. The phases are Prep, ID, Containment, Eradication, Recovery, and Lessons Learned." },
            { q: "What does the 'Containment' phase of incident response involve?", options: ["Putting the server in a box", "Isolating infected systems from the network to prevent the malware from spreading further", "Deleting all company data", "Arresting the hacker"], a: 1, e: "Containment stops the bleeding before eradication and recovery begin." },
            { q: "What is 'Network Forensics'?", options: ["Fixing broken cables", "The capture, recording, and analysis of network events and packet traffic to discover the source of security attacks", "Designing a new Wi-Fi system", "Installing routers"], a: 1, e: "Network forensics involves analyzing packet captures (PCAPs) to see exactly how an attacker moved through the network." },
            { q: "What are 'Timestamps' in file systems used for in forensics?", options: ["Telling the current time", "Tracking the exact date and time a file was created, modified, or accessed to build a timeline of events", "Making files run faster", "Encrypting data"], a: 1, e: "Timestamps help investigators reconstruct the sequence of actions taken by a suspect or malware." },
            { q: "What is a 'Slack Space' on a hard drive?", options: ["A space for employees to relax", "The leftover, unused space between the end of a file and the end of the data cluster it occupies, which can hide data", "The space on the desktop", "A type of cloud storage"], a: 1, e: "Hackers sometimes hide small pieces of malicious code or data in slack space to avoid detection." },
            { q: "Which tool is considered an industry standard for performing digital forensic investigations?", options: ["Microsoft Word", "EnCase / FTK (Forensic Toolkit)", "Adobe Photoshop", "Google Chrome"], a: 1, e: "Tools like EnCase and FTK are court-accepted suites for imaging and analyzing digital evidence." },
            { q: "What is 'Anti-Forensics'?", options: ["Supporting forensic investigators", "Techniques used by attackers to hide evidence, securely wipe files, or confuse forensic analysts", "A type of antivirus", "A legal defense strategy"], a: 1, e: "Anti-forensics includes secure file deletion, encryption, and altering timestamps to cover tracks." },

            // Part 6: Laws, IT Act & Compliance (121-140)
            { q: "A multinational company handling Indian citizens’ personal data fails to comply with the DPDP Act 2023. Which risk do they face?", options: ["Ethical hacking mandates", "Legal penalties and restrictions on data processing", "Cyber forensic investigation", "NCSP 2013 enforcement"], a: 1, e: "The DPDP Act 2023 imposes heavy fines up to ₹250 crore and operational restrictions for non-compliance." },
            { q: "What does DPDP Act stand for?", options: ["Digital Privacy and Data Policy Act", "Data Protection and Digital Privacy Act", "Digital Personal Data Protection Act", "Digital Policy for Data Processing Act"], a: 2, e: "The DPDP Act 2023 provides a framework for the processing of digital personal data in India." },
            { q: "Under the DPDP Act 2023, what is a 'Data Fiduciary'?", options: ["The person whose data is collected", "The entity that determines the purpose and means of processing personal data", "The hacker who steals the data", "The government auditor"], a: 1, e: "A Data Fiduciary (e.g., a company) is responsible for safely managing user data." },
            { q: "In the context of the DPDP Act 2023, what is the right of a 'Data Principal'?", options: ["To sell data to third parties", "To request the correction or erasure of their personal data", "To hack into government databases", "To avoid paying taxes"], a: 1, e: "The Data Principal (the user/citizen) has the right to access, correct, and erase their personal information." },
            { q: "Which section of the Indian IT Act, 2000 deals with punishment for hacking computer systems?", options: ["Section 43", "Section 66", "Section 67", "Section 65"], a: 1, e: "Section 66 of the IT Act prescribes up to 3 years imprisonment or fine for hacking." },
            { q: "Section 66C of the IT Act, 2000 specifically deals with:", options: ["Cyber Terrorism", "Identity Theft and making use of another person's electronic signature/password", "Child Pornography", "E-commerce taxation"], a: 1, e: "Section 66C penalizes identity theft and fraudulent use of credentials." },
            { q: "Which section of the IT Act, 2000 deals with Cyber Terrorism?", options: ["Section 66A", "Section 66F", "Section 67", "Section 43"], a: 1, e: "Section 66F provides for life imprisonment for acts of cyber terrorism against India." },
            { q: "What is the main objective of the National Cyber Security Policy (NCSP) 2013?", options: ["To ban all foreign software", "To build a secure and resilient cyberspace for citizens, businesses, and the Government", "To promote ethical hacking as a sport", "To monitor all citizen phone calls"], a: 1, e: "NCSP 2013 aims to protect information infrastructure and build capabilities to prevent cyber attacks." },
            { q: "Under the IT Act, what is considered an 'Electronic Signature'?", options: ["A scanned copy of a physical signature", "A digital authentication technique recognized by law to verify the authenticity of an electronic record", "A signature drawn with a mouse", "A thumbprint on paper"], a: 1, e: "Electronic signatures use cryptographic techniques (like digital certificates) to authenticate documents legally." },
            { q: "What is 'Cert-In'?", options: ["A certification for hardware", "The Indian Computer Emergency Response Team, the national nodal agency for responding to computer security incidents", "A new internet protocol", "A hacking group"], a: 1, e: "CERT-In acts as the central hub for reporting and mitigating cyber threats in India." },
            { q: "What does 'GDPR' stand for in European data protection law?", options: ["General Data Protection Regulation", "Global Data Privacy Rules", "Government Data Protection Rights", "General Digital Privacy Regulation"], a: 0, e: "GDPR is the EU's strict data privacy law, which inspired elements of India's DPDP Act." },
            { q: "Under DPDP Act 2023, processing personal data requires:", options: ["No permission if the user is online", "Clear and affirmative Consent from the Data Principal", "Permission from the police", "A small fee to be paid to the government"], a: 1, e: "Consent must be free, specific, informed, unconditional, and unambiguous with a clear affirmative action." },
            { q: "What is a 'Data Breach'?", options: ["A secure backup", "An incident where confidential or protected data is accessed, disclosed, or stolen by an unauthorized person", "Deleting a file accidentally", "Upgrading a database"], a: 1, e: "Data breaches expose sensitive user data, often resulting in severe legal and reputational damage." },
            { q: "Section 67 of the IT Act, 2000 deals with:", options: ["Publishing or transmitting obscene material in electronic form", "Hacking a bank", "Stealing a laptop", "Software piracy"], a: 0, e: "Section 67 penalizes the transmission of obscenity over digital platforms." },
            { q: "What is the role of a 'Data Protection Officer' (DPO) under privacy laws?", options: ["To hack competitor data", "To ensure an organization complies with data protection laws and acts as a point of contact for users and authorities", "To sell user data legally", "To manage the company's firewall"], a: 1, e: "Significant Data Fiduciaries must appoint a DPO to oversee legal compliance and data privacy." },
            { q: "Section 43 of the IT Act, 2000 primarily focuses on:", options: ["Cyber terrorism", "Penalty for damage to computer, computer system, etc., without permission", "Publishing fake news", "Online banking"], a: 1, e: "Section 43 provides compensation to the victim if their computer system is damaged or accessed without permission." },
            { q: "Which of the following is considered 'Sensitive Personal Data'?", options: ["First Name", "Public LinkedIn Profile", "Biometric data, passwords, and financial information", "Company address"], a: 2, e: "Sensitive data requires the highest level of protection due to the severe harm its exposure could cause." },
            { q: "What does 'Anonymization' of data mean?", options: ["Hiding data behind a password", "Irreversibly stripping personal identifiers from data so it can never be traced back to an individual", "Using a fake name online", "Encrypting a file"], a: 1, e: "True anonymization takes data out of the scope of privacy laws because it is no longer 'personal data'." },
            { q: "What is 'Intellectual Property (IP) Theft' in cyber space?", options: ["Stealing an IP address", "The unauthorized copying or theft of digital trade secrets, software, or copyrighted material", "Hacking a smart TV", "Downloading free music legally"], a: 1, e: "IP theft involves stealing the ideas, designs, or proprietary software of a company." },
            { q: "Why is Cyber Law necessary?", options: ["To make computers run faster", "To provide a legal framework for prosecuting cybercriminals and protecting digital privacy and commerce", "To ban social media", "To increase taxes on electronics"], a: 1, e: "Traditional laws often fail to cover the complexities of digital crimes, necessitating specific Cyber Laws." },

            // Part 7: Network Security, Defense & Cryptography (141-150)
            { q: "What is the primary function of a Firewall?", options: ["To filter incoming and outgoing network traffic based on predetermined security rules", "To speed up the internet connection", "To back up files automatically", "To encrypt local hard drives"], a: 0, e: "A firewall acts as a barrier between a trusted internal network and untrusted external networks." },
            { q: "Which tool actively monitors network traffic for malicious activity and takes action to block it?", options: ["Intrusion Detection System (IDS)", "Intrusion Prevention System (IPS)", "Switch", "Router"], a: 1, e: "While an IDS only detects and alerts, an IPS (Prevention System) actively blocks the malicious traffic." },
            { q: "What does a VPN (Virtual Private Network) do?", options: ["Removes viruses from a computer", "Blocks phishing emails", "Increases hard drive storage", "Creates a secure, encrypted tunnel for data transmission over a public network"], a: 3, e: "VPNs mask IP addresses and encrypt data, ensuring privacy on public networks." },
            { q: "What is the concept of a 'Zero Trust' network architecture?", options: ["Trust no one, inside or outside the network; verify every user and device before granting access", "Trust internal users, but verify external ones", "Trust all devices that have an antivirus", "Trust the network administrator blindly"], a: 0, e: "Zero Trust assumes breaches are inevitable, so every access request must be authenticated and authorized." },
            { q: "Which of the following is an example of Multi-Factor Authentication (MFA)?", options: ["A password and an OTP sent to a mobile device", "Two different passwords", "A username and a password", "Answering two security questions"], a: 0, e: "MFA requires two or more independent credentials (something you know, something you have, something you are)." },
            { q: "What is a 'Honeypot' in cyber security?", options: ["A sweet virus", "A secure vault for passwords", "A type of firewall", "A decoy system designed to lure attackers to study their hacking methods without risking real data"], a: 3, e: "Honeypots distract attackers from valuable targets and help security teams analyze attack patterns." },
            { q: "Why is 'Patch Management' critical for securing systems?", options: ["It makes software run faster", "It applies updates that fix known security vulnerabilities before hackers can exploit them", "It reduces memory usage", "It is required for warranty"], a: 1, e: "Unpatched software is the primary entry point for malware and hackers." },
            { q: "Which encryption type uses a public key for encryption and a private key for decryption?", options: ["Asymmetric Encryption", "Symmetric Encryption", "Hashing", "Steganography"], a: 0, e: "Asymmetric encryption uses two mathematically linked keys: one public and one private." },
            { q: "What does 'Steganography' refer to?", options: ["Encrypting data so it is unreadable", "Hiding secret data within an ordinary, non-secret file or image to avoid detection", "Deleting data permanently", "Stealing passwords"], a: 1, e: "Unlike encryption which scrambles data, steganography hides the very existence of the data." },
            { q: "What is a 'DMZ' (Demilitarized Zone) in network security?", options: ["A physical war zone", "A subnetwork that exposes an organization's external-facing services to an untrusted network, adding an extra layer of security", "A completely disconnected computer", "A type of malware"], a: 1, e: "A DMZ separates public-facing servers (like web servers) from the secure internal network." }
        ];

        let currentIdx = 0, score = 0, answered = false;

        function startQuiz() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            
            const totalQuestions = questions.length;
            document.getElementById('progress-text').innerText = `Question 1/${totalQuestions}`;
            document.getElementById('final-total').innerText = `Correct out of ${totalQuestions}`;
            
            loadQuestion();
        }

        function loadQuestion() {
            const q = questions[currentIdx];
            const totalQuestions = questions.length;
            
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('progress-text').innerText = `Question ${currentIdx + 1}/${totalQuestions}`;
            document.getElementById('progress-bar').style.width = `${((currentIdx + 1) / totalQuestions) * 100}%`;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-4 rounded-2xl border-2 border-slate-100 hover:border-rose-200 hover:bg-rose-50 font-medium text-sm text-slate-700 transition-all";
                btn.innerText = opt;
                btn.onclick = () => selectOption(i, btn);
                container.appendChild(btn);
            });
            
            document.getElementById('explanation-box').classList.add('hidden');
            document.getElementById('next-btn').classList.add('hidden');
            answered = false;
        }

        function selectOption(idx, btn) {
            if (answered) return;
            answered = true;
            
            const q = questions[currentIdx];
            const allBtns = document.querySelectorAll('#options-container button');
            
            if (idx === q.a) {
                score++;
                btn.classList.add('border-green-500', 'bg-green-50', 'text-green-700');
                document.getElementById('score-text').innerText = `Score: ${score}`;
            } else {
                btn.classList.add('border-red-500', 'bg-red-50', 'text-red-700');
                allBtns[q.a].classList.add('border-green-500', 'bg-green-50', 'text-green-700');
            }
            
            const exp = document.getElementById('explanation-box');
            exp.innerHTML = `<strong>Explanation:</strong> ${q.e}`;
            exp.classList.remove('hidden');
            document.getElementById('next-btn').classList.remove('hidden');
        }

        function nextQuestion() {
            if (currentIdx < questions.length - 1) {
                currentIdx++;
                loadQuestion();
            } else {
                document.getElementById('quiz-screen').classList.add('hidden');
                document.getElementById('result-screen').classList.remove('hidden');
                document.getElementById('final-score').innerText = score;
            }
        }
    </script>
</body>
</html>
