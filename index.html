  { q: "How does AI contribute to Green Computing in data centres?", options: ["AI increases energy consumption for training", "AI monitors and manages power consumption to ensure IT operations run as efficiently as possible", "AI replaces all human workers", "AI increases the number of physical servers needed"], a: 1, e: "AI can monitor and manage power consumption in data centres, ensuring that IT operations run as efficiently as possible — a key optimization technique in Green Computing." },
 
  // ── 12. E-Waste Management ────────────────────────────────────────────────
  { q: "What is E-Waste?", options: ["Energy wasted by computers", "Discarded electronic devices such as computers, smartphones, TVs, and servers", "Electronic documents that are deleted", "Errors in software code"], a: 1, e: "E-waste (Electronic Waste) refers to discarded electronic devices such as computers, smartphones, TVs, servers, and other IT equipment." },
 
  { q: "Which toxic materials found in e-waste can harm the environment and human health?", options: ["Oxygen, nitrogen, and carbon dioxide", "Lead, mercury, cadmium, and arsenic", "Gold, silver, and copper only", "Silicon and plastic only"], a: 1, e: "E-waste often contains toxic materials like lead, mercury, cadmium, and arsenic that can harm the environment and human health if not disposed of properly." },
 
  { q: "Which E-Waste Management benefit refers to recovering valuable materials like gold, copper, and silver?", options: ["Reduces Environmental Pollution", "Reduces Landfills", "Conserves Resources by recovering valuable materials", "Supports Circular Economy"], a: 2, e: "Conserves Resources is an E-Waste Management benefit — recycling e-waste recovers valuable materials like gold, copper, and silver that would otherwise require energy-intensive mining." },
 
  { q: "What is the first step in the E-Waste Management process?", options: ["Dismantling", "Recycling & Recovery", "Sorting & Segregation", "Collection — gathering old electronics via e-waste bins, buy-back programs, or collection centres"], a: 3, e: "Collection is the first step in E-Waste Management — gathering old electronics via e-waste bins, buy-back programs, or collection centres before they can be processed." },

  // ── 13. Quantum Computing ─────────────────────────────────────────────────
  { q: "What is Quantum Computing?", options: ["A computing method using only binary bits", "A field that uses quantum mechanics to solve complex problems far faster than classical computers, using quantum bits (qubits)", "A new type of cloud storage", "A method of programming using quantum programming languages only"], a: 1, e: "Quantum computing uses quantum mechanics to solve complex problems far faster than classical computers, leveraging quantum properties like superposition and entanglement via qubits instead of traditional bits." },
 
  { q: "What is a Qubit?", options: ["A classical binary bit that is 0 or 1", "The fundamental unit of quantum information that can exist in multiple states at once due to superposition", "A quantum networking device", "A type of quantum gate"], a: 1, e: "A Qubit (Quantum Bit) is the fundamental unit of quantum information. Unlike classical bits (0 or 1), qubits can exist in multiple states at once due to superposition." },
 
  { q: "What is Superposition in Quantum Computing?", options: ["Two qubits affecting each other", "A qubit can be 0, 1, or both at the same time, allowing massive parallel computation", "Cancelling incorrect results in computations", "The use of quantum gates for calculations"], a: 1, e: "Superposition means a qubit can be 0, 1, or both at the same time — allowing quantum computers to perform massive parallel computation unlike classical computers that process one state at a time." },
 
  { q: "What is Quantum Entanglement?", options: ["A qubit existing in multiple states at once", "Two or more qubits being correlated such that the state of one instantly affects the other even across long distances", "Cancelling incorrect computation results", "A type of quantum logic gate"], a: 1, e: "Entanglement means two or more qubits can be correlated — the state of one instantly affects the other even across long distances, enabling powerful coordination in quantum computations." },
 
  { q: "Quantum Interference in Quantum Computing is used to:", options: ["Increase qubit count", "Enhance correct results and cancel incorrect ones in computations", "Store quantum data permanently", "Connect quantum computers to classical networks"], a: 1, e: "Quantum Interference is used to enhance correct results and cancel incorrect ones in quantum computations — improving the accuracy and efficiency of quantum algorithms." },
 
  { q: "Classical computers use AND, OR logic gates. Quantum computers use:", options: ["Same AND, OR gates", "Quantum gates such as Hadamard, CNOT, and Pauli-X to manipulate qubits", "Relational operators", "SQL-based query gates"], a: 1, e: "Instead of classical logic gates (AND, OR), quantum computers use Quantum Gates (Hadamard, CNOT, Pauli-X, etc.) to manipulate qubits and perform quantum computations." },
 
  { q: "Which advantage of Quantum Computing refers to solving problems that classical supercomputers cannot?", options: ["Stronger Security", "Optimization", "High Processing Power", "Complex Problem Solving"], a: 2, e: "High Processing Power is a quantum computing advantage — it can solve problems that classical supercomputers cannot, due to superposition and entanglement enabling massive parallel computation." },
 
  { q: "Post-quantum cryptography refers to which Quantum Computing advantage?", options: ["High Processing Power", "Stronger Security — enables new cryptographic methods resistant to quantum attacks", "Optimization", "Complex Problem Solving"], a: 1, e: "Stronger Security is a quantum computing advantage — it enables new cryptographic methods (post-quantum cryptography) that are resistant to attacks from quantum computers themselves." },
 
  { q: "Which quantum computing application involves simulating molecular interactions to design new medications?", options: ["Financial Modeling", "Logistics & Optimization", "Traffic Optimization", "Drug Discovery"], a: 3, e: "Drug Discovery is a quantum computing application — simulating molecular interactions to design new medications and vaccines, speeding up the development process and potentially reducing costs." },
 
  { q: "Quantum computing application in Materials Science involves:", options: ["Optimizing financial portfolios", "Discovering and designing new materials like catalysts for cleaner energy or improved battery technologies", "Improving supply chain logistics", "Training AI models faster"], a: 1, e: "Materials Science is a quantum computing application — discovering and designing new materials (novel catalysts for cleaner energy or improved batteries) by accurately simulating material properties at a molecular level." },
 
  { q: "Which quantum computing application improves supply chain efficiency and delivery route optimization?", options: ["Drug Discovery", "Financial Modeling", "Logistics & Optimization", "Climate Analysis"], a: 2, e: "Logistics & Optimization is a quantum computing application — improving supply chain efficiency, optimizing delivery routes, and managing resource allocation by solving complex optimization problems more effectively." },
 
  { q: "Quantum computing in AI & Machine Learning is used to:", options: ["Replace all AI models", "Accelerate AI model training and inference, leading to breakthroughs in deep learning and NLP", "Store training datasets more efficiently", "Reduce the number of parameters in neural networks"], a: 1, e: "AI & Machine Learning is a quantum computing application — quantum computing accelerates AI model training and inference, leading to breakthroughs in deep learning and natural language processing." },
 
  { q: "Climate Analysis is a quantum computing application because:", options: ["Quantum computers can control weather", "Quantum computing can model complex climate systems and develop solutions for carbon capture by simulating molecular interactions", "Quantum computers use less energy than classical ones", "Quantum computers generate no heat"], a: 1, e: "Climate Analysis is a quantum computing application — quantum computing can model complex climate systems and develop new solutions for carbon capture and storage by simulating molecular interactions." },
 
  { q: "Developing better fertilizers by simulating chemical processes involved in plant growth is a quantum computing application in:", options: ["Healthcare", "Finance", "Agriculture", "Cybersecurity"], a: 2, e: "Agriculture is a quantum computing application — quantum computers can develop better and more efficient fertilizers by simulating chemical processes involved in plant growth, improving food production." },
 
  { q: "Quantum computing is currently described as being in which phase?", options: ["Fully commercially deployed and widely available", "Research and development phase, poised to revolutionize numerous industries", "Completely replaced classical computing", "Available only in smartphones"], a: 1, e: "Quantum computing is currently in the research and development phase, but is poised to revolutionize numerous industries by providing massive performance gains for specific, complex applications." },
 
  { q: "Financial Modeling is a quantum computing application that involves:", options: ["Drug synthesis simulations", "Optimizing financial portfolios, managing risk, detecting fraud, and improving asset pricing with greater speed and accuracy", "Developing new battery materials", "Modelling climate systems"], a: 1, e: "Financial Modeling is a quantum computing application — optimizing financial portfolios, managing risk, detecting fraud, and improving asset pricing by handling complex calculations with greater speed and accuracy." },
   ];

        let currentIdx = 0, score = 0, answered = false;

        function startQuiz() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            
            const totalQuestions = questions.length;
            document.getElementById('progress-text').innerText = `Question 1/${totalQuestions}`;
            document.getElementById('final-total').innerText = `Correct out of ${totalQuestions}`;
            
            loadQuestion();
        }

        function loadQuestion() {
            const q = questions[currentIdx];
            const totalQuestions = questions.length;
            
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('progress-text').innerText = `Question ${currentIdx + 1}/${totalQuestions}`;
            document.getElementById('progress-bar').style.width = `${((currentIdx + 1) / totalQuestions) * 100}%`;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-4 rounded-2xl border-2 border-slate-100 hover:border-rose-200 hover:bg-rose-50 font-medium text-sm text-slate-700 transition-all";
                btn.innerText = opt;
                btn.onclick = () => selectOption(i, btn);
                container.appendChild(btn);
            });
            
            document.getElementById('explanation-box').classList.add('hidden');
            document.getElementById('next-btn').classList.add('hidden');
            answered = false;
        }

        function selectOption(idx, btn) {
            if (answered) return;
            answered = true;
            
            const q = questions[currentIdx];
            const allBtns = document.querySelectorAll('#options-container button');
            
            if (idx === q.a) {
                score++;
                btn.classList.add('border-green-500', 'bg-green-50', 'text-green-700');
                document.getElementById('score-text').innerText = `Score: ${score}`;
            } else {
                btn.classList.add('border-red-500', 'bg-red-50', 'text-red-700');
                allBtns[q.a].classList.add('border-green-500', 'bg-green-50', 'text-green-700');
            }
            
            const exp = document.getElementById('explanation-box');
            exp.innerHTML = `<strong>Explanation:</strong> ${q.e}`;
            exp.classList.remove('hidden');
            document.getElementById('next-btn').classList.remove('hidden');
        }

        function nextQuestion() {
            if (currentIdx < questions.length - 1) {
                currentIdx++;
                loadQuestion();
            } else {
                document.getElementById('quiz-screen').classList.add('hidden');
                document.getElementById('result-screen').classList.remove('hidden');
                document.getElementById('final-score').innerText = score;
            }
        }
    </script>
